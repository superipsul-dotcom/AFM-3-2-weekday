<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>만 나이 계산기</title>
  <!-- Tailwind CSS: 유틸리티 클래스로 스타일링 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 + ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel: JSX를 브라우저에서 바로 변환 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- lunar-javascript: 음력 ↔ 양력 변환 라이브러리. 전역에 Lunar, Solar 객체를 노출합니다 -->
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
</head>
<body class="bg-gradient-to-b from-sky-50 to-indigo-50 min-h-screen">
  <div id="root"></div>

  <!-- 반드시 type="text/babel" 이어야 JSX 문법을 사용할 수 있습니다 -->
  <script type="text/babel">
    // ========================================
    // React Hooks 꺼내쓰기
    // useState: 값을 "기억"하고, 값이 바뀌면 화면을 다시 그려주는 도구
    // ========================================
    const { useState } = React;

    // ========================================
    // 📅 날짜 도우미 함수들 (순수 함수)
    // 시간대(timezone) 영향을 줄이기 위해, 연/월/일 숫자만으로 Date를 만드는 게 핵심!
    // new Date("2000-05-10") 처럼 문자열로 만들면 UTC 기준으로 해석되어
    // 나라/시간대에 따라 하루가 어긋날 수 있어요. 그래서 숫자 3개로 직접 만듭니다.
    // ========================================

    // "YYYY-MM-DD" 문자열 → 연/월/일 숫자로 쪼개기
    function parseYmd(ymdString) {
      // 예: "2000-05-10".split("-") → ["2000", "05", "10"]
      const [y, m, d] = ymdString.split("-").map(Number);
      return { y, m, d };
    }

    // 연/월/일 숫자로 "자정(00:00:00)" 기준 Date 만들기
    // 주의: Date의 월(month)은 0부터 시작하므로 (m - 1) 로 넣어줍니다.
    function ymdToDate(y, m, d) {
      return new Date(y, m - 1, d);
    }

    // ========================================
    // 🌙 음력(Lunar) → 양력(Solar) 변환
    // lunar-javascript 라이브러리를 사용합니다.
    // 입력: 음력 연/월/일 숫자
    // 출력: { y, m, d, ymd }  (대응되는 양력 날짜)
    // 윤달(leap month)은 평달 기준으로 단순 변환합니다(학습용으로 충분).
    // ========================================
    function lunarToSolar(y, m, d) {
      // 음력 연/월/일로 Lunar 객체를 만들고, getSolar()로 양력 객체를 얻습니다
      const lunar = Lunar.fromYmd(y, m, d);
      const solar = lunar.getSolar();
      return {
        y: solar.getYear(),
        m: solar.getMonth(),
        d: solar.getDay(),
        ymd: solar.toYmd(), // "1995-04-14" 형식 문자열
      };
    }

    // ========================================
    // 🧮 만 나이 + 총 살아온 날짜 계산 로직 (순수 함수)
    // 입력: 양력 기준 생일 Date(birthDate), 오늘 날짜(Date)
    // 출력: { age, daysToBirthday, totalDays } 또는 { error }
    // ========================================
    function calculateAge(birthDate, today) {
      // 1) 오늘도 "자정 기준"으로 다시 만들어, 생일과 같은 조건으로 비교합니다.
      const todayMidnight = ymdToDate(today.getFullYear(), today.getMonth() + 1, today.getDate());

      // 2) 미래 날짜인지 검사 (오늘보다 뒤면 안 됨)
      if (birthDate > todayMidnight) {
        return { error: "미래 날짜는 입력할 수 없습니다." };
      }

      // 3) 기본 나이 = 올해 연도 - 태어난 연도
      let age = todayMidnight.getFullYear() - birthDate.getFullYear();

      // 4) 올해 생일이 아직 안 지났으면 1살을 빼준다 (만 나이의 핵심!)
      const monthDiff = todayMidnight.getMonth() - birthDate.getMonth();
      const dayDiff = todayMidnight.getDate() - birthDate.getDate();
      if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
        age = age - 1;
      }

      // 하루 = 1000ms * 60 * 60 * 24
      const msPerDay = 1000 * 60 * 60 * 24;

      // 5) 지금까지 살아온 총 날짜 = (오늘 자정 - 생일 자정) / 하루
      //    floor 로 내림하여 "꽉 채운 일수"만 셉니다.
      const totalDays = Math.floor((todayMidnight - birthDate) / msPerDay);

      // 6) (보너스) 다음 생일까지 남은 일수 계산
      //    올해 생일 날짜를 만들고, 이미 지났으면 내년으로 옮긴다
      const nextBirthday = new Date(todayMidnight.getFullYear(), birthDate.getMonth(), birthDate.getDate());
      if (nextBirthday < todayMidnight) {
        nextBirthday.setFullYear(todayMidnight.getFullYear() + 1);
      }
      const daysToBirthday = Math.ceil((nextBirthday - todayMidnight) / msPerDay);

      return { age, daysToBirthday, totalDays };
    }

    // ========================================
    // 🎨 디자인 시스템 컴포넌트 (재사용 UI)
    // 비즈니스 로직 없이 props만 받아서 보여주는 순수 컴포넌트들
    // ========================================

    // 버튼: variant(primary/ghost)로 색을 바꿉니다
    function Button({ children, onClick, variant = "primary", className = "" }) {
      const base = "px-5 py-3 rounded-xl font-semibold text-base transition active:scale-95 focus:outline-none focus:ring-4";
      const variants = {
        primary: "bg-indigo-500 text-white hover:bg-indigo-600 focus:ring-indigo-200",
        ghost: "bg-white text-indigo-600 border border-indigo-200 hover:bg-indigo-50 focus:ring-indigo-100",
      };
      return (
        <button onClick={onClick} className={`${base} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    }

    // 카드: 가운데 정렬된 흰색 박스
    function Card({ children }) {
      return (
        <div className="bg-white rounded-3xl shadow-xl shadow-indigo-100 p-6 sm:p-8 w-full max-w-md">
          {children}
        </div>
      );
    }

    // 세그먼트 토글: 두 개의 선택지(예: 양력/음력) 중 하나를 고릅니다.
    // options = [{ value, label }, ...], value = 현재 선택값, onChange = 선택 변경 함수
    function SegmentToggle({ options, value, onChange }) {
      return (
        <div className="flex bg-gray-100 rounded-xl p-1 gap-1" role="radiogroup" aria-label="달력 종류 선택">
          {options.map((opt) => {
            const active = opt.value === value;
            return (
              <button
                key={opt.value}
                type="button"
                role="radio"
                aria-checked={active}
                onClick={() => onChange(opt.value)}
                className={
                  "flex-1 py-2 rounded-lg text-sm font-semibold transition " +
                  (active
                    ? "bg-white text-indigo-600 shadow"
                    : "text-gray-500 hover:text-gray-700")
                }
              >
                {opt.label}
              </button>
            );
          })}
        </div>
      );
    }

    // ========================================
    // 🚀 App 컴포넌트 (메인 화면 + 핵심 로직)
    // ========================================
    function App() {
      // (상태 1) 사용자가 입력한 생년월일 문자열 ("YYYY-MM-DD")
      const [birth, setBirth] = useState("");
      // (상태 2) 달력 종류: "solar"(양력) 또는 "lunar"(음력). 기본값은 양력!
      const [calendar, setCalendar] = useState("solar");
      // (상태 3) 계산 결과 (나이, 남은 일수, 총 일수)
      const [result, setResult] = useState(null);
      // (상태 4) 안내/에러 메시지
      const [message, setMessage] = useState("");
      // (상태 5) 음력 입력 시, 변환된 양력 날짜 안내 문구 (학습용으로 보여줌)
      const [convertNote, setConvertNote] = useState("");

      // [핵심] "나이 계산하기" 버튼 onClick에 연결될 함수
      const handleCalculate = () => {
        // 매번 새로 계산하므로, 이전 결과/안내는 먼저 비워둡니다
        setResult(null);
        setConvertNote("");

        // 검증 1: 미입력
        if (!birth) {
          setMessage("생년월일을 먼저 입력해 주세요.");
          return;
        }

        // 입력 문자열을 연/월/일 숫자로 분해
        const { y, m, d } = parseYmd(birth);

        // 만 나이 계산에 사용할 "양력 기준" 생일 Date
        let birthDate;

        if (calendar === "lunar") {
          // 음력 모드: lunar.js 라이브러리가 로드됐는지 가드 처리
          if (typeof window.Lunar === "undefined") {
            setMessage("음력 변환 라이브러리를 불러오지 못했습니다. 네트워크를 확인해 주세요.");
            return;
          }

          // 입력한 음력 날짜 → 대응되는 양력 날짜로 변환
          const solar = lunarToSolar(y, m, d);
          // 변환 결과를 화면에 작게 보여주기 (학습 도움용)
          setConvertNote(
            `음력 ${y}년 ${m}월 ${d}일 → 양력 ${solar.ymd}`
          );
          // 변환된 양력 연/월/일로 자정 기준 Date 생성
          birthDate = ymdToDate(solar.y, solar.m, solar.d);
        } else {
          // 양력 모드: 입력한 연/월/일 그대로 자정 기준 Date 생성
          birthDate = ymdToDate(y, m, d);
        }

        // 계산 실행 (양력 기준 생일과 오늘 날짜를 넘김)
        const output = calculateAge(birthDate, new Date());

        // 검증 2: 계산 로직이 에러를 돌려준 경우
        //         (양력은 input max로 막지만, 음력은 변환 결과가 미래일 수 있어 여기서 한 번 더 검사)
        if (output.error) {
          setConvertNote("");
          setMessage(output.error);
          return;
        }

        // 성공: 결과 상태를 채우고 메시지는 비운다 → 화면이 자동으로 다시 그려짐
        setResult(output);
        setMessage("");
      };

      // "초기화" 버튼 onClick에 연결될 함수: 모든 상태를 처음으로
      const handleReset = () => {
        setBirth("");
        setCalendar("solar"); // 달력 종류도 기본값(양력)으로
        setResult(null);
        setMessage("");
        setConvertNote("");
      };

      // 달력 종류(양력/음력)를 바꿀 때: 이전 결과는 비워서 혼동을 막습니다
      const handleCalendarChange = (next) => {
        setCalendar(next);
        setResult(null);
        setMessage("");
        setConvertNote("");
      };

      // input에서 Enter 키를 누르면 계산되도록 (키보드 이벤트 학습)
      const handleKeyDown = (e) => {
        if (e.key === "Enter") {
          handleCalculate();
        }
      };

      // 음력 모드에서는 양력으로 변환해봐야 미래 여부를 알 수 있으므로
      // input의 max(미래 차단)는 양력 모드일 때만 적용합니다.
      const todayStr = new Date().toISOString().split("T")[0];

      return (
        <main className="min-h-screen flex flex-col items-center justify-center p-4">
          <Card>
            {/* 제목 영역 */}
            <div className="text-center mb-6">
              <div className="text-4xl mb-2">🎂</div>
              <h1 className="text-2xl font-bold text-gray-800">만 나이 계산기</h1>
              <p className="text-sm text-gray-500 mt-1">생년월일을 입력하면 만 나이를 알려드려요</p>
            </div>

            {/* 달력 종류 선택 영역 (양력 / 음력 토글) */}
            <label className="block text-sm font-medium text-gray-700 mb-2">
              달력 종류
            </label>
            <SegmentToggle
              options={[
                { value: "solar", label: "양력" },
                { value: "lunar", label: "음력" },
              ]}
              value={calendar}
              onChange={handleCalendarChange}
            />

            {/* 입력 영역 */}
            <label htmlFor="birth" className="block text-sm font-medium text-gray-700 mb-2 mt-5">
              {calendar === "lunar" ? "생년월일 (음력으로 입력)" : "생년월일 (양력)"}
            </label>
            <input
              id="birth"
              type="date"
              // value를 상태(birth)와 묶으면 "제어 컴포넌트"가 됩니다
              value={birth}
              // 입력값이 바뀔 때마다(onChange) 상태를 갱신 → 화면도 갱신
              onChange={(e) => setBirth(e.target.value)}
              // Enter 키 이벤트 연결
              onKeyDown={handleKeyDown}
              // 양력 모드일 때만 미래 날짜를 달력에서 못 고르도록 오늘로 max 제한
              // (음력은 변환 후에야 미래 여부를 알 수 있어 계산 시점에 검사합니다)
              max={calendar === "solar" ? todayStr : undefined}
              className="w-full px-4 py-3 rounded-xl border border-gray-300 text-gray-800 focus:outline-none focus:ring-4 focus:ring-indigo-200 focus:border-indigo-400"
            />
            {calendar === "lunar" && (
              <p className="mt-2 text-xs text-gray-400">
                음력 날짜를 입력하면 양력으로 바꿔 계산해요 (윤달은 평달 기준)
              </p>
            )}

            {/* 버튼 영역 */}
            <div className="flex gap-3 mt-5">
              <Button onClick={handleCalculate} className="flex-1">나이 계산하기</Button>
              <Button onClick={handleReset} variant="ghost">초기화</Button>
            </div>

            {/* 안내/에러 메시지: message 상태가 있을 때만 보여줌 */}
            {message && (
              <p className="mt-4 text-center text-sm text-rose-500 bg-rose-50 rounded-xl py-2 px-3">
                {message}
              </p>
            )}

            {/* 결과 영역: result 상태가 채워졌을 때만 보여줌 */}
            {result && (
              <div className="mt-6 text-center bg-indigo-50 rounded-2xl py-6 px-4">
                {/* 음력 입력이었다면 변환된 양력 날짜를 작게 안내 */}
                {convertNote && (
                  <p className="text-xs text-indigo-400 mb-3">{convertNote}</p>
                )}

                <p className="text-gray-600 text-sm mb-1">당신의 만 나이는</p>
                <p className="text-5xl font-extrabold text-indigo-600">
                  만 {result.age}세
                </p>

                {/* 추가 기능: 지금까지 살아온 총 날짜 (천단위 콤마) */}
                <p className="mt-4 text-base text-gray-700">
                  지금까지{" "}
                  <span className="font-bold text-indigo-600">
                    {result.totalDays.toLocaleString()}
                  </span>
                  일을 살았어요
                </p>

                {/* 보너스 정보: 다음 생일까지 남은 일수 */}
                <p className="mt-2 text-sm text-gray-500">
                  {result.daysToBirthday === 0
                    ? "🎉 오늘이 생일이에요! 축하합니다!"
                    : `다음 생일까지 ${result.daysToBirthday}일 남았어요`}
                </p>
              </div>
            )}
          </Card>

          <p className="text-xs text-gray-400 mt-6">React + Tailwind 로 만든 학습용 예제</p>
        </main>
      );
    }

    // ========================================
    // 렌더링: #root 안에 App을 그립니다
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
