<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음이 - 마음 상담 챗봇</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 타이핑 인디케이터 점 애니메이션 (Tailwind로 표현하기 어려운 지연 애니메이션) */
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }
    .typing-dot {
      animation: typingBounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* 메시지 등장 애니메이션 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-enter {
      animation: fadeInUp 0.3s ease-out;
    }

    /* 부드러운 스크롤바 */
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb {
      background: rgba(167, 139, 250, 0.3);
      border-radius: 9999px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks 추출
    // ========================================
    const { useState, useEffect, useRef, useCallback } = React;

    // ========================================
    // 🌐 백엔드 API 호출 (POST /api/chat)
    // ========================================
    // 화면에 표시되는 메시지 목록(sender: 'bot' | 'user')을
    // OpenAI 형식(role: 'assistant' | 'user')으로 변환해 서버로 전송한다.
    async function fetchReply(historyMessages) {
      const apiMessages = historyMessages.map((m) => ({
        role: m.sender === 'bot' ? 'assistant' : 'user',
        content: m.text,
      }));

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: apiMessages }),
      });

      let body = null;
      try {
        body = await res.json();
      } catch (_) {
        /* JSON 파싱 실패 */
      }

      if (!res.ok || !body || !body.success) {
        const message = (body && body.message) || '응답을 받지 못했어요.';
        throw new Error(message);
      }
      return body.data.reply;
    }

    // API 호출 실패 시 사용자에게 보여줄 부드러운 안내 메시지
    const ERROR_REPLY =
      '죄송해요, 지금 잠시 마음이가 답하기 어려운 상태예요. 🌿\n잠시 후에 다시 한 번 이야기를 들려주시겠어요?';

    // 시간 포맷 (오전/오후 h:mm)
    function formatTime(date) {
      let h = date.getHours();
      const m = date.getMinutes().toString().padStart(2, '0');
      const period = h < 12 ? '오전' : '오후';
      h = h % 12;
      if (h === 0) h = 12;
      return `${period} ${h}:${m}`;
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================

    // 상담사 아바타
    function Avatar({ size = 'md', className = '' }) {
      const sizeMap = { sm: 'w-8 h-8 text-lg', md: 'w-11 h-11 text-2xl', lg: 'w-14 h-14 text-3xl' };
      return (
        <div
          className={`${sizeMap[size]} rounded-full bg-gradient-to-br from-violet-300 to-rose-200 flex items-center justify-center shadow-sm shrink-0 ${className}`}
          aria-hidden="true"
        >
          <span>🌿</span>
        </div>
      );
    }

    // 빠른 응답 칩 버튼
    function QuickReplyChip({ label, onClick, disabled }) {
      return (
        <button
          type="button"
          onClick={() => onClick(label)}
          disabled={disabled}
          className="whitespace-nowrap px-4 py-2 rounded-full bg-white/80 border border-violet-200 text-violet-700 text-sm font-medium shadow-sm hover:bg-violet-50 hover:border-violet-300 active:scale-95 transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {label}
        </button>
      );
    }

    // 메시지 말풍선
    function MessageBubble({ message }) {
      const isBot = message.sender === 'bot';
      return (
        <div className={`msg-enter flex gap-2.5 ${isBot ? 'justify-start' : 'justify-end'}`}>
          {isBot && <Avatar size="sm" className="mt-1" />}
          <div className={`flex flex-col max-w-[78%] sm:max-w-[70%] ${isBot ? 'items-start' : 'items-end'}`}>
            <div
              className={
                isBot
                  ? 'px-4 py-3 rounded-2xl rounded-tl-md bg-white text-slate-700 shadow-sm border border-violet-100 leading-relaxed'
                  : 'px-4 py-3 rounded-2xl rounded-tr-md bg-gradient-to-br from-violet-500 to-indigo-500 text-white shadow-sm leading-relaxed'
              }
            >
              <p className="whitespace-pre-wrap break-words text-[15px]">{message.text}</p>
            </div>
            <span className="text-[11px] text-slate-400 mt-1 px-1">{message.time}</span>
          </div>
        </div>
      );
    }

    // 타이핑 인디케이터
    function TypingIndicator() {
      return (
        <div className="msg-enter flex gap-2.5 justify-start" aria-label="상담사가 입력 중입니다">
          <Avatar size="sm" className="mt-1" />
          <div className="px-4 py-4 rounded-2xl rounded-tl-md bg-white shadow-sm border border-violet-100 flex items-center gap-1.5">
            <span className="typing-dot w-2 h-2 rounded-full bg-violet-400 inline-block"></span>
            <span className="typing-dot w-2 h-2 rounded-full bg-violet-400 inline-block"></span>
            <span className="typing-dot w-2 h-2 rounded-full bg-violet-400 inline-block"></span>
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 Header (상담사 정보 + 온라인 상태)
    // ========================================
    function ChatHeader() {
      return (
        <header className="shrink-0 bg-white/70 backdrop-blur-md border-b border-violet-100">
          <div className="px-4 py-3 flex items-center gap-3">
            <div className="relative">
              <Avatar size="md" />
              <span className="absolute bottom-0 right-0 w-3.5 h-3.5 bg-emerald-400 border-2 border-white rounded-full" aria-hidden="true"></span>
            </div>
            <div className="flex-1 min-w-0">
              <h1 className="font-bold text-slate-800 text-lg leading-tight">마음이</h1>
              <p className="text-xs text-emerald-600 font-medium flex items-center gap-1">
                <span className="w-1.5 h-1.5 bg-emerald-400 rounded-full inline-block"></span>
                온라인 · 마음 상담 도우미
              </p>
            </div>
          </div>
          {/* Disclaimer 배너 */}
          <div className="px-4 py-2 bg-amber-50/80 border-t border-amber-100">
            <p className="text-[11px] text-amber-700 leading-snug text-center">
              ⚠️ 마음이는 따뜻한 대화를 나누는 AI 도우미예요. 전문적인 의료·심리 치료를 대체하지 않습니다. 위급 시 1577-0199(정신건강위기상담) 또는 109(자살예방)로 연락해 주세요.
            </p>
          </div>
        </header>
      );
    }

    // ========================================
    // 📄 ChatPage (메인 채팅 화면 - 상태 & 비즈니스 로직)
    // ========================================
    const QUICK_REPLIES = ['요즘 너무 힘들어요', '잠이 안 와요', '불안해요', '아무도 없는 것 같아요', '스트레스가 심해요'];

    function ChatPage() {
      const [messages, setMessages] = useState(() => [
        {
          id: 'welcome',
          sender: 'bot',
          text: '안녕하세요, 저는 마음이예요. 🌿\n오늘 하루는 어떠셨나요? 어떤 이야기든 편하게 들려주세요. 제가 곁에서 함께 들을게요.',
          time: formatTime(new Date()),
        },
      ]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);

      const scrollRef = useRef(null);
      const inputRef = useRef(null);

      // 새 메시지/타이핑 시 자동 스크롤
      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [messages, isTyping]);

      const sendMessage = useCallback(
        async (rawText) => {
          const text = rawText.trim();
          if (!text || isTyping) return;

          const userMsg = {
            id: `u-${Date.now()}`,
            sender: 'user',
            text,
            time: formatTime(new Date()),
          };

          // 사용자 메시지를 추가한 직후의 전체 대화 맥락을 서버로 전송
          const history = [...messages, userMsg];

          setMessages((prev) => [...prev, userMsg]);
          setInput('');
          setIsTyping(true);

          try {
            const reply = await fetchReply(history);
            const botMsg = {
              id: `b-${Date.now()}`,
              sender: 'bot',
              text: reply,
              time: formatTime(new Date()),
            };
            setMessages((prev) => [...prev, botMsg]);
          } catch (err) {
            const errorMsg = {
              id: `e-${Date.now()}`,
              sender: 'bot',
              text: ERROR_REPLY,
              time: formatTime(new Date()),
            };
            setMessages((prev) => [...prev, errorMsg]);
          } finally {
            setIsTyping(false);
          }
        },
        [isTyping, messages]
      );

      const handleSubmit = (e) => {
        e.preventDefault();
        sendMessage(input);
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage(input);
        }
      };

      const handleQuickReply = (label) => {
        sendMessage(label);
        if (inputRef.current) inputRef.current.focus();
      };

      return (
        <div className="w-full max-w-lg mx-auto h-[100dvh] flex flex-col bg-gradient-to-b from-violet-50 via-rose-50 to-indigo-50 shadow-2xl sm:my-0 overflow-hidden">
          <ChatHeader />

          {/* 메시지 영역 */}
          <main
            ref={scrollRef}
            className="chat-scroll flex-1 overflow-y-auto px-4 py-5 space-y-4"
            aria-live="polite"
          >
            {messages.map((m) => (
              <MessageBubble key={m.id} message={m} />
            ))}
            {isTyping && <TypingIndicator />}
          </main>

          {/* 빠른 응답 칩 */}
          <div className="shrink-0 px-4 pt-2 pb-1 overflow-x-auto">
            <div className="flex gap-2 w-max">
              {QUICK_REPLIES.map((q) => (
                <QuickReplyChip key={q} label={q} onClick={handleQuickReply} disabled={isTyping} />
              ))}
            </div>
          </div>

          {/* 입력창 */}
          <footer className="shrink-0 bg-white/70 backdrop-blur-md border-t border-violet-100 px-3 py-3">
            <form onSubmit={handleSubmit} className="flex items-end gap-2">
              <textarea
                ref={inputRef}
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                rows={1}
                placeholder="마음속 이야기를 들려주세요..."
                aria-label="메시지 입력"
                className="flex-1 resize-none max-h-28 px-4 py-2.5 rounded-2xl border border-violet-200 bg-white text-slate-700 text-[15px] placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-violet-300 focus:border-transparent leading-relaxed"
              />
              <button
                type="submit"
                disabled={!input.trim() || isTyping}
                aria-label="메시지 전송"
                className="shrink-0 w-11 h-11 rounded-full bg-gradient-to-br from-violet-500 to-indigo-500 text-white flex items-center justify-center shadow-md hover:shadow-lg active:scale-95 transition disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100"
              >
                <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
              </button>
            </form>
          </footer>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return (
        <div className="min-h-[100dvh] bg-gradient-to-br from-violet-100 via-rose-100 to-indigo-100 flex items-center justify-center">
          <ChatPage />
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
