<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 날씨</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -468px 0; } 100% { background-position: 468px 0; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes bgshift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .animate-fadeIn { animation: fadeIn 0.5s ease both; }
    .animate-floaty { animation: floaty 4s ease-in-out infinite; }
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.18) 37%, rgba(255,255,255,0.06) 63%);
      background-size: 800px 104px;
      animation: shimmer 1.4s linear infinite;
    }
    .spinner {
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: rgba(255,255,255,0.95);
      border-radius: 9999px;
      animation: spin 0.8s linear infinite;
    }
    .glass {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .glass-soft {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.14);
    }
    .app-bg { background-size: 200% 200%; animation: bgshift 18s ease infinite; transition: background-image 0.8s ease; }
    .no-scrollbar::-webkit-scrollbar { height: 6px; }
    .no-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 9999px; }
    .no-scrollbar::-webkit-scrollbar-track { background: transparent; }
    /* --- Leaflet z-index containment ---
       Leaflet's internal panes/controls use z-index 200..700 (within the map's
       own stacking context). We wrap the map in a container that establishes its
       OWN stacking context (isolation: isolate) and sits at a low z-index, so the
       search dropdown (z-30 on a higher element) always renders above the map. */
    .map-stack { isolation: isolate; position: relative; z-index: 0; }
    .leaflet-container { background: rgba(255,255,255,0.06); font: inherit; }
    /* Keep Leaflet's own controls below the app's overlays just in case */
    .map-stack .leaflet-pane,
    .map-stack .leaflet-top,
    .map-stack .leaflet-bottom { z-index: auto; }
    .map-stack .leaflet-control-container .leaflet-top { z-index: 5; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ========================================
    // Config
    // ========================================
    const OWM_KEY = "222b1df4207e76db3dacc7d3ee6b9c90";

    // ========================================
    // Helpers (OpenWeatherMap codes, formatting, backgrounds)
    // ========================================
    const DEFAULT_CITY = { name: '서울', lat: 37.5665, lon: 126.9780, admin1: '대한민국' };

    // Maps an OpenWeatherMap condition id (weather[0].id) + day/night
    // to an emoji + a gradient category. The Korean LABEL is taken from
    // the API's weather[0].description (lang=kr) at call sites.
    function weatherInfo(code, isDay = true) {
      // Atmosphere / fog group (7xx)
      if (code === 781) return { emoji: '🌪️', key: 'storm' };
      if (code >= 700 && code < 800) return { emoji: '🌫️', key: 'fog' };
      // Thunderstorm (2xx)
      if (code >= 200 && code < 300) return { emoji: '⛈️', key: 'storm' };
      // Drizzle (3xx)
      if (code >= 300 && code < 400) return { emoji: '🌦️', key: 'rain' };
      // Rain (5xx)
      if (code >= 500 && code < 600) {
        if (code === 511) return { emoji: '🌨️', key: 'snow' }; // freezing rain
        return { emoji: '🌧️', key: 'rain' };
      }
      // Snow (6xx)
      if (code >= 600 && code < 700) {
        if (code === 600 || code === 601 || code === 620 || code === 621) return { emoji: '❄️', key: 'snow' };
        return { emoji: '🌨️', key: 'snow' };
      }
      // Clear (800)
      if (code === 800) return { emoji: isDay ? '☀️' : '🌙', key: 'clear' };
      // Clouds (80x)
      if (code === 801 || code === 802) return { emoji: '🌤️', key: 'cloud' };
      if (code === 803 || code === 804) return { emoji: '☁️', key: 'cloud' };
      return { emoji: '🌡️', key: 'cloud' };
    }

    // Returns a tailwind-ready gradient string based on weather + day/night
    function backgroundGradient(code, isDay) {
      const key = weatherInfo(code, isDay).key;
      if (!isDay) {
        // Night variants
        if (key === 'storm') return 'linear-gradient(135deg,#0b1026,#1a1530,#2d1b3d)';
        if (key === 'rain') return 'linear-gradient(135deg,#0f172a,#1e293b,#334155)';
        if (key === 'snow') return 'linear-gradient(135deg,#1e293b,#334155,#475569)';
        return 'linear-gradient(135deg,#0f0c29,#1a1a40,#24243e)';
      }
      switch (key) {
        case 'clear': return 'linear-gradient(135deg,#2980f0,#56ccf2,#7ee8fa)';
        case 'cloud': return 'linear-gradient(135deg,#3a6ea5,#6390b0,#9bb8cc)';
        case 'fog':   return 'linear-gradient(135deg,#5d7a8c,#8ba3b0,#b4c4cc)';
        case 'rain':  return 'linear-gradient(135deg,#3a4a6b,#536285,#73809e)';
        case 'snow':  return 'linear-gradient(135deg,#6f8caf,#a3bdd6,#d6e6f2)';
        case 'storm': return 'linear-gradient(135deg,#2b2f4a,#41476b,#5c5f8a)';
        default:      return 'linear-gradient(135deg,#2980f0,#56ccf2,#7ee8fa)';
      }
    }

    // Accepts a Unix timestamp in seconds (OpenWeatherMap style)
    function fmtTime(unixSec) {
      if (unixSec == null) return '--:--';
      const d = new Date(unixSec * 1000);
      let h = d.getHours();
      const m = String(d.getMinutes()).padStart(2, '0');
      const ampm = h < 12 ? '오전' : '오후';
      h = h % 12; if (h === 0) h = 12;
      return `${ampm} ${h}:${m}`;
    }

    function fmtTodayKR(tz) {
      const d = new Date();
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
    }

    // Accepts a Unix timestamp in seconds (OpenWeatherMap forecast dt)
    function hourLabel(unixSec) {
      const d = new Date(unixSec * 1000);
      let h = d.getHours();
      const ampm = h < 12 ? '오전' : '오후';
      const hh = h % 12 === 0 ? 12 : h % 12;
      return `${ampm} ${hh}시`;
    }

    function round(n) { return n == null ? '-' : Math.round(n); }

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Button({ children, onClick, variant = 'primary', className = '', type = 'button', disabled, ...rest }) {
      const variants = {
        primary: 'bg-white/90 text-slate-800 hover:bg-white shadow-lg',
        ghost: 'bg-white/15 text-white hover:bg-white/25 border border-white/25',
        danger: 'bg-rose-500/90 text-white hover:bg-rose-500',
      };
      return (
        <button
          type={type} onClick={onClick} disabled={disabled}
          className={`px-4 py-2 rounded-xl font-semibold text-sm transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Card({ children, className = '', soft = false }) {
      return (
        <div className={`${soft ? 'glass-soft' : 'glass'} rounded-3xl shadow-xl ${className}`}>
          {children}
        </div>
      );
    }

    function Stat({ icon, label, value, sub }) {
      return (
        <div className="glass-soft rounded-2xl p-4 flex flex-col gap-1">
          <div className="flex items-center gap-1.5 text-white/70 text-xs font-medium">
            <span className="text-base leading-none">{icon}</span>{label}
          </div>
          <div className="text-white text-lg font-bold leading-tight">{value}</div>
          {sub && <div className="text-white/60 text-xs">{sub}</div>}
        </div>
      );
    }

    function Spinner({ size = 40 }) {
      return <div className="spinner" style={{ width: size, height: size }} aria-label="로딩 중" role="status" />;
    }

    // ========================================
    // 🧩 Search Box (city geocoding)
    // ========================================
    function SearchBox({ onSelect }) {
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [open, setOpen] = useState(false);
      const [searching, setSearching] = useState(false);
      const boxRef = useRef(null);
      const debounceRef = useRef(null);

      useEffect(() => {
        function onDocClick(e) {
          if (boxRef.current && !boxRef.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener('mousedown', onDocClick);
        return () => document.removeEventListener('mousedown', onDocClick);
      }, []);

      useEffect(() => {
        if (debounceRef.current) clearTimeout(debounceRef.current);
        const q = query.trim();
        if (q.length < 1) { setResults([]); setOpen(false); return; }
        debounceRef.current = setTimeout(async () => {
          setSearching(true);
          try {
            const url = `https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(q)}&limit=5&appid=${OWM_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            setResults(Array.isArray(data) ? data : []);
            setOpen(true);
          } catch (e) {
            setResults([]);
          } finally {
            setSearching(false);
          }
        }, 350);
        return () => clearTimeout(debounceRef.current);
      }, [query]);

      function displayName(r) {
        return (r.local_names && r.local_names.ko) ? r.local_names.ko : r.name;
      }

      function pick(r) {
        onSelect({
          name: displayName(r),
          lat: r.lat,
          lon: r.lon,
          admin1: [r.state, r.country].filter(Boolean).join(', '),
        });
        setQuery('');
        setResults([]);
        setOpen(false);
      }

      return (
        <div ref={boxRef} className="relative w-full max-w-md">
          <div className="glass rounded-2xl flex items-center px-4 py-2.5 gap-2">
            <span className="text-white/70 text-lg" aria-hidden>🔍</span>
            <input
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              onFocus={() => results.length && setOpen(true)}
              placeholder="도시 검색 (예: 부산, Tokyo)"
              aria-label="도시 검색"
              className="bg-transparent outline-none text-white placeholder-white/60 w-full text-sm"
            />
            {searching && <Spinner size={18} />}
          </div>
          {open && (
            <div className="absolute z-30 mt-2 w-full glass rounded-2xl overflow-hidden shadow-2xl animate-fadeIn">
              {results.length === 0 ? (
                <div className="px-4 py-3 text-white/70 text-sm">검색 결과가 없습니다.</div>
              ) : (
                results.map((r, idx) => (
                  <button
                    key={`${r.lat},${r.lon},${idx}`}
                    onClick={() => pick(r)}
                    className="w-full text-left px-4 py-3 hover:bg-white/15 transition flex items-center justify-between gap-2"
                  >
                    <span className="text-white font-medium text-sm">{displayName(r)}</span>
                    <span className="text-white/60 text-xs truncate">
                      {[r.state, r.country].filter(Boolean).join(', ')}
                    </span>
                  </button>
                ))
              )}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 🧩 Skeleton / Loading screens
    // ========================================
    function LoadingScreen() {
      return (
        <div className="w-full max-w-3xl mx-auto flex flex-col items-center gap-6 animate-fadeIn">
          <div className="glass rounded-3xl w-full p-8 flex flex-col items-center gap-4">
            <Spinner size={56} />
            <p className="text-white/80 text-sm">날씨 정보를 불러오는 중입니다...</p>
            <div className="w-full grid grid-cols-3 gap-3 mt-2">
              {[...Array(6)].map((_, i) => (
                <div key={i} className="skeleton h-16 rounded-2xl" />
              ))}
            </div>
          </div>
        </div>
      );
    }

    function ErrorScreen({ message, onRetry }) {
      return (
        <Card className="w-full max-w-md mx-auto p-8 flex flex-col items-center gap-4 text-center animate-fadeIn">
          <div className="text-5xl">😵</div>
          <h2 className="text-white text-xl font-bold">문제가 발생했어요</h2>
          <p className="text-white/75 text-sm">{message || '날씨 정보를 가져오지 못했습니다.'}</p>
          <Button onClick={onRetry}>다시 시도</Button>
        </Card>
      );
    }

    // ========================================
    // 🧩 Hourly strip
    // ========================================
    // `hourly` is an array of { dt (unix sec), temp, code, isDay }
    function HourlyStrip({ hourly }) {
      if (!hourly || !hourly.length) return null;
      return (
        <Card soft className="p-4">
          <div className="text-white/80 text-sm font-semibold mb-3 px-1">시간별 기온</div>
          <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
            {hourly.map((it, i) => {
              const info = weatherInfo(it.code, it.isDay);
              return (
                <div
                  key={it.dt}
                  className={`flex-shrink-0 w-16 rounded-2xl py-3 flex flex-col items-center gap-1.5 transition ${i === 0 ? 'bg-white/25 ring-1 ring-white/40' : 'bg-white/8'}`}
                >
                  <span className="text-white/70 text-[11px] font-medium">{hourLabel(it.dt)}</span>
                  <span className="text-xl leading-none">{info.emoji}</span>
                  <span className="text-white font-bold text-sm">{round(it.temp)}°</span>
                </div>
              );
            })}
          </div>
        </Card>
      );
    }

    // ========================================
    // 🗺️ LocationMap (Leaflet wrapper)
    // ========================================
    // Renders an interactive Leaflet/OpenStreetMap map. Creates the map ONCE on
    // mount (guarded against double-init), and only updates view/marker position
    // when the lat/lon props change. The user can drag the marker OR click the
    // map to pick a precise point; `onPick(lat, lon)` fires only on drag END or
    // map click (never during a drag) so we don't spam re-fetches.
    function LocationMap({ lat, lon, onPick }) {
      const containerRef = useRef(null);
      const mapRef = useRef(null);
      const markerRef = useRef(null);
      // Keep the latest onPick in a ref so the map (created once) always calls
      // the current handler without re-binding listeners.
      const onPickRef = useRef(onPick);
      useEffect(() => { onPickRef.current = onPick; }, [onPick]);

      // --- "내 위치 찾기" (locate me) control state ---
      const [locating, setLocating] = useState(false);
      const [locError, setLocError] = useState('');

      // Auto-dismiss the error toast after a few seconds.
      useEffect(() => {
        if (!locError) return;
        const t = setTimeout(() => setLocError(''), 4500);
        return () => clearTimeout(t);
      }, [locError]);

      const handleLocateMe = useCallback(() => {
        if (locating) return; // ignore stacked clicks while in flight
        setLocError('');
        if (!navigator.geolocation) {
          setLocError('이 브라우저는 위치 정보를 지원하지 않습니다.');
          return;
        }
        setLocating(true);
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const { latitude, longitude } = pos.coords;
            // Animate a zoom-in to the located point, then reuse the existing
            // onPick handler (reverse-geocode + weather refetch for this point).
            const map = mapRef.current;
            const marker = markerRef.current;
            if (marker) marker.setLatLng([latitude, longitude]);
            if (map) {
              if (typeof map.flyTo === 'function') {
                map.flyTo([latitude, longitude], 14, { duration: 1.2 });
              } else {
                map.setView([latitude, longitude], 14, { animate: true });
              }
            }
            onPickRef.current && onPickRef.current(latitude, longitude);
            setLocating(false);
          },
          (err) => {
            // error.code === 1 -> PERMISSION_DENIED
            if (err && err.code === 1) {
              setLocError('위치 권한이 거부되었거나 위치를 가져올 수 없습니다.');
            } else {
              setLocError('위치를 가져올 수 없습니다. 잠시 후 다시 시도해 주세요.');
            }
            setLocating(false);
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      }, [locating]);

      // Create the map exactly once.
      useEffect(() => {
        if (!containerRef.current || mapRef.current) return; // guard double-init
        if (typeof L === 'undefined') return; // Leaflet failed to load

        const startLat = typeof lat === 'number' ? lat : DEFAULT_CITY.lat;
        const startLon = typeof lon === 'number' ? lon : DEFAULT_CITY.lon;

        const map = L.map(containerRef.current, {
          center: [startLat, startLon],
          zoom: 12,
          zoomControl: true,
          attributionControl: true,
        });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '&copy; OpenStreetMap',
        }).addTo(map);

        const marker = L.marker([startLat, startLon], { draggable: true }).addTo(map);

        // Drag END (not during drag) -> pick the dropped point.
        marker.on('dragend', () => {
          const p = marker.getLatLng();
          onPickRef.current && onPickRef.current(p.lat, p.lng);
        });
        // Click anywhere on the map -> move marker there & pick.
        map.on('click', (e) => {
          marker.setLatLng(e.latlng);
          onPickRef.current && onPickRef.current(e.latlng.lat, e.latlng.lng);
        });

        mapRef.current = map;
        markerRef.current = marker;

        // Tiles may render before the container has its final size; nudge Leaflet.
        setTimeout(() => map.invalidateSize(), 0);

        return () => {
          map.remove();
          mapRef.current = null;
          markerRef.current = null;
        };
      }, []);

      // On lat/lon prop change (search / geolocation / fallback): recenter & move
      // the marker WITHOUT recreating the map.
      useEffect(() => {
        if (!mapRef.current || !markerRef.current) return;
        if (typeof lat !== 'number' || typeof lon !== 'number') return;
        const next = [lat, lon];
        markerRef.current.setLatLng(next);
        mapRef.current.setView(next, mapRef.current.getZoom(), { animate: true });
      }, [lat, lon]);

      return (
        <Card soft className="p-4">
          <div className="text-white/80 text-sm font-semibold mb-3 px-1 flex items-center gap-1.5">
            <span aria-hidden>🗺️</span> 위치 지도
          </div>
          <div className="map-stack rounded-2xl overflow-hidden">
            <div
              ref={containerRef}
              className="w-full h-64 md:h-72"
              role="application"
              aria-label="현재 위치 지도"
            />

            {/* "내 위치 찾기" control — rendered as a SIBLING overlay (not a child
                of the Leaflet container), so the map's own `click` handler never
                fires underneath it. We still stop propagation defensively. It is
                absolutely positioned inside `.map-stack`, which owns the local
                stacking context (isolation: isolate), so z-20 here stays ABOVE
                Leaflet tiles/controls (z<=5 inside the map) yet stays fully
                contained — it cannot escape to compete with the search dropdown
                (z-30 on a higher, separately-stacked element). */}
            <button
              type="button"
              onClick={(e) => { e.stopPropagation(); handleLocateMe(); }}
              onMouseDown={(e) => e.stopPropagation()}
              onDoubleClick={(e) => e.stopPropagation()}
              disabled={locating}
              aria-label="내 위치 찾기"
              title="내 위치 찾기"
              className="glass absolute bottom-3 right-3 z-20 flex items-center gap-2 rounded-full pl-3 pr-3.5 py-2 text-white text-xs font-semibold shadow-lg transition hover:bg-white/25 active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed"
            >
              {locating ? (
                <span className="spinner" style={{ width: 16, height: 16 }} role="status" aria-hidden />
              ) : (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden>
                  <circle cx="12" cy="12" r="7" />
                  <line x1="12" y1="1" x2="12" y2="4" />
                  <line x1="12" y1="20" x2="12" y2="23" />
                  <line x1="1" y1="12" x2="4" y2="12" />
                  <line x1="20" y1="12" x2="23" y2="12" />
                  <circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none" />
                </svg>
              )}
              <span>{locating ? '찾는 중…' : '내 위치'}</span>
            </button>

            {/* Inline error toast (permission denied / unavailable) */}
            {locError && (
              <div
                className="glass absolute top-3 left-3 right-3 z-20 rounded-xl px-3 py-2 text-white/90 text-xs flex items-start gap-2 shadow-lg animate-fadeIn"
                role="alert"
              >
                <span aria-hidden>⚠️</span>
                <span className="leading-snug">{locError}</span>
              </div>
            )}
          </div>
          <p className="text-white/65 text-xs mt-2.5 px-1">
            📍 핀을 드래그하거나 지도를 클릭해 정확한 위치를 선택하세요
          </p>
        </Card>
      );
    }

    // ========================================
    // 🧩 Weather View (main display)
    // ========================================
    function WeatherView({ data, city, onPickLocation }) {
      const cur = data.current;
      const info = weatherInfo(cur.code, cur.isDay);
      const label = cur.description
        ? cur.description.charAt(0).toUpperCase() + cur.description.slice(1)
        : info.emoji;

      return (
        <div className="w-full max-w-3xl mx-auto flex flex-col gap-4 animate-fadeIn">
          {/* Hero */}
          <Card className="p-7 md:p-9">
            <div className="flex flex-col items-center text-center">
              <div className="text-white/90 text-lg font-semibold flex items-center gap-1.5">
                <span aria-hidden>📍</span>{city.name}
              </div>
              <div className="text-white/60 text-xs mt-0.5">{city.admin1}</div>
              <div className="text-white/55 text-xs mt-1">{fmtTodayKR()}</div>

              <div className="text-7xl md:text-8xl my-3 animate-floaty" aria-hidden>{info.emoji}</div>

              <div className="flex items-start justify-center">
                <span className="text-white text-7xl md:text-8xl font-extralight leading-none">{round(cur.temp)}</span>
                <span className="text-white text-3xl font-light mt-2">°C</span>
              </div>
              <div className="text-white text-xl font-semibold mt-1">{label}</div>
              <div className="text-white/75 text-sm mt-1">체감 {round(cur.feelsLike)}°</div>

              <div className="flex items-center gap-4 mt-3 text-white/85 text-sm">
                <span className="flex items-center gap-1">🔺 최고 {round(cur.tempMax)}°</span>
                <span className="flex items-center gap-1">🔻 최저 {round(cur.tempMin)}°</span>
              </div>
            </div>
          </Card>

          {/* Details grid */}
          <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
            <Stat icon="💧" label="습도" value={`${round(cur.humidity)}%`} />
            <Stat icon="🌧️" label="강수량" value={`${cur.precipitation ?? 0} mm`} />
            <Stat icon="💨" label="풍속" value={`${round(cur.windSpeed)} m/s`} />
            <Stat icon="☔" label="강수확률" value={`${cur.pop ?? 0}%`} />
            <Stat icon="🌅" label="일출" value={fmtTime(cur.sunrise)} />
            <Stat icon="🌇" label="일몰" value={fmtTime(cur.sunset)} />
          </div>

          {/* Hourly */}
          <HourlyStrip hourly={data.hourly} />

          {/* Interactive location map */}
          <LocationMap lat={city.lat} lon={city.lon} onPick={onPickLocation} />
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [city, setCity] = useState(null);
      const [data, setData] = useState(null);
      const [status, setStatus] = useState('init'); // init | loading | ready | error
      const [error, setError] = useState('');
      const [notice, setNotice] = useState('');

      // Translate an OpenWeatherMap HTTP status into a Korean message
      function owmErrorMessage(status) {
        if (status === 401) return 'API 키가 유효하지 않습니다. 키를 확인해 주세요.';
        if (status === 429) return '요청이 너무 많습니다. 잠시 후 다시 시도해 주세요.';
        if (status === 404) return '해당 위치의 날씨를 찾을 수 없습니다.';
        return `서버 응답 오류 (${status})`;
      }

      const loadWeather = useCallback(async (targetCity) => {
        setStatus('loading');
        setError('');
        try {
          const { lat, lon } = targetCity;
          const base = `lat=${lat}&lon=${lon}&appid=${OWM_KEY}&units=metric&lang=kr`;
          const curUrl = `https://api.openweathermap.org/data/2.5/weather?${base}`;
          const fcUrl = `https://api.openweathermap.org/data/2.5/forecast?${base}`;

          const [curRes, fcRes] = await Promise.all([fetch(curUrl), fetch(fcUrl)]);
          if (!curRes.ok) throw new Error(owmErrorMessage(curRes.status));
          if (!fcRes.ok) throw new Error(owmErrorMessage(fcRes.status));

          const cw = await curRes.json();
          const fc = await fcRes.json();
          if (!cw.main || !cw.weather || !cw.weather[0]) {
            throw new Error('날씨 데이터를 찾을 수 없습니다.');
          }

          const isDay = (cw.weather[0].icon || '').endsWith('d');

          // --- Forecast (3-hour steps) ---
          const list = Array.isArray(fc.list) ? fc.list : [];
          // Next ~8 forecast steps for the hourly strip
          const hourly = list.slice(0, 8).map((it) => ({
            dt: it.dt,
            temp: it.main?.temp,
            code: it.weather?.[0]?.id ?? 800,
            isDay: (it.weather?.[0]?.icon || '').endsWith('d'),
          }));

          // Today's forecast items (local date matches current local date)
          const todayStr = new Date().toDateString();
          const todayItems = list.filter(
            (it) => new Date(it.dt * 1000).toDateString() === todayStr
          );
          // Max precip probability (pop 0..1) among today's items
          const popSource = todayItems.length ? todayItems : list.slice(0, 8);
          const maxPop = popSource.reduce(
            (m, it) => Math.max(m, typeof it.pop === 'number' ? it.pop : 0),
            0
          );

          // Today's high/low: prefer current temp_min/max, widen with forecast
          let tempMin = cw.main.temp_min;
          let tempMax = cw.main.temp_max;
          todayItems.forEach((it) => {
            if (typeof it.main?.temp_min === 'number') tempMin = Math.min(tempMin, it.main.temp_min);
            if (typeof it.main?.temp_max === 'number') tempMax = Math.max(tempMax, it.main.temp_max);
          });

          const normalized = {
            current: {
              temp: cw.main.temp,
              feelsLike: cw.main.feels_like,
              humidity: cw.main.humidity,
              tempMin,
              tempMax,
              code: cw.weather[0].id,
              description: cw.weather[0].description,
              icon: cw.weather[0].icon,
              windSpeed: cw.wind?.speed,
              sunrise: cw.sys?.sunrise,
              sunset: cw.sys?.sunset,
              precipitation: cw.rain?.['1h'] ?? 0,
              pop: Math.round(maxPop * 100),
              isDay,
            },
            hourly,
          };

          setCity(targetCity);
          setData(normalized);
          setStatus('ready');
        } catch (e) {
          setError(e.message || '알 수 없는 오류');
          setStatus('error');
        }
      }, []);

      // Reverse-geocode lat/lon to a Korean city name (best-effort)
      const resolveAndLoadByCoords = useCallback(async (lat, lon) => {
        let name = '현재 위치', admin1 = '';
        try {
          const r = await fetch(`https://api.openweathermap.org/geo/1.0/reverse?lat=${lat}&lon=${lon}&limit=1&appid=${OWM_KEY}`);
          const d = await r.json();
          if (Array.isArray(d) && d[0]) {
            name = (d[0].local_names && d[0].local_names.ko) ? d[0].local_names.ko : d[0].name;
            admin1 = [d[0].state, d[0].country].filter(Boolean).join(', ');
          }
        } catch (_) { /* ignore, keep generic name */ }
        loadWeather({ name, lat, lon, admin1: admin1 || '현재 위치 기준' });
      }, [loadWeather]);

      // On mount: try geolocation, fall back to default city
      useEffect(() => {
        if (!navigator.geolocation) {
          setNotice('이 브라우저는 위치 정보를 지원하지 않아 기본 도시(서울)를 표시합니다.');
          loadWeather(DEFAULT_CITY);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            setNotice('');
            resolveAndLoadByCoords(pos.coords.latitude, pos.coords.longitude);
          },
          (err) => {
            setNotice('위치 권한이 없어 기본 도시(서울)를 표시합니다. 위쪽 검색창에서 다른 도시를 찾아보세요.');
            loadWeather(DEFAULT_CITY);
          },
          { enableHighAccuracy: false, timeout: 8000, maximumAge: 600000 }
        );
      }, [loadWeather, resolveAndLoadByCoords]);

      const handleSelectCity = useCallback((c) => {
        setNotice('');
        loadWeather(c);
      }, [loadWeather]);

      const handleRetry = useCallback(() => {
        loadWeather(city || DEFAULT_CITY);
      }, [city, loadWeather]);

      // User picked a point on the map (drag end / click). Reverse-geocode the
      // exact coordinates to a Korean place name and re-fetch the weather there.
      const handlePickLocation = useCallback((lat, lon) => {
        setNotice('');
        resolveAndLoadByCoords(lat, lon);
      }, [resolveAndLoadByCoords]);

      // Dynamic background
      const bg = useMemo(() => {
        if (data && data.current) {
          return backgroundGradient(data.current.code, data.current.isDay);
        }
        return 'linear-gradient(135deg,#2980f0,#56ccf2,#7ee8fa)';
      }, [data]);

      return (
        <div className="app-bg min-h-screen w-full px-4 py-6 md:py-10" style={{ backgroundImage: bg }}>
          <div className="max-w-3xl mx-auto flex flex-col items-center gap-5">
            {/* Header */}
            <div className="w-full flex flex-col items-center gap-4">
              <h1 className="text-white text-2xl md:text-3xl font-bold tracking-tight drop-shadow flex items-center gap-2">
                <span aria-hidden>🌈</span> 오늘의 날씨
              </h1>
              <SearchBox onSelect={handleSelectCity} />
              {notice && (
                <div className="glass-soft rounded-xl px-4 py-2.5 text-white/85 text-xs md:text-sm text-center max-w-md animate-fadeIn">
                  ⚠️ {notice}
                </div>
              )}
            </div>

            {/* Body */}
            <div className="w-full mt-1">
              {(status === 'init' || status === 'loading') && <LoadingScreen />}
              {status === 'error' && <ErrorScreen message={error} onRetry={handleRetry} />}
              {status === 'ready' && data && city && (
                <WeatherView data={data} city={city} onPickLocation={handlePickLocation} />
              )}
            </div>

            <footer className="text-white/50 text-[11px] mt-4 text-center">
              데이터 제공: OpenWeatherMap · 위치 정보는 브라우저에만 사용됩니다.
            </footer>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
