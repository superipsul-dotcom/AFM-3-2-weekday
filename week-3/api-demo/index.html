<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API 호출 데모</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Tailwind으로 표현하기 어려운 진입 애니메이션 정의 */
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.95) translateY(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .animate-pop-in { animation: popIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .animate-fade-in { animation: fadeIn 0.4s ease both; }

    /* 부드러운 그라데이션 배경이 천천히 움직이도록 */
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animated-bg {
      background: linear-gradient(135deg, #eef2ff 0%, #faf5ff 35%, #ecfeff 70%, #eef2ff 100%);
      background-size: 300% 300%;
      animation: gradientShift 18s ease infinite;
    }
  </style>
</head>
<body class="animated-bg min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useRef } = React;

    // ========================================
    // 🎨 디자인 시스템 컴포넌트 (순수 프레젠테이션)
    // ========================================

    /** 로딩 스피너 (size: sm | md) */
    function Spinner({ size = "md", className = "" }) {
      const dim = size === "sm" ? "h-4 w-4" : "h-6 w-6";
      return (
        <svg
          className={`animate-spin ${dim} ${className}`}
          viewBox="0 0 24 24"
          fill="none"
          aria-hidden="true"
        >
          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
          <path
            className="opacity-90"
            fill="currentColor"
            d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
          />
        </svg>
      );
    }

    /** 기본 버튼 (variant: primary | secondary | ghost / size: sm | md | lg) */
    function Button({
      variant = "primary",
      size = "md",
      disabled = false,
      onClick,
      className = "",
      children,
      ...rest
    }) {
      const base =
        "inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all duration-200 focus:outline-none focus-visible:ring-4 disabled:cursor-not-allowed select-none";
      const variants = {
        primary:
          "text-white bg-gradient-to-r from-indigo-500 to-violet-500 shadow-lg shadow-indigo-500/30 hover:shadow-xl hover:shadow-indigo-500/40 hover:-translate-y-0.5 active:translate-y-0 focus-visible:ring-indigo-300 disabled:opacity-60 disabled:shadow-none disabled:translate-y-0",
        secondary:
          "text-indigo-700 bg-white border border-indigo-200 hover:bg-indigo-50 hover:border-indigo-300 focus-visible:ring-indigo-200 disabled:opacity-60",
        ghost:
          "text-slate-600 bg-transparent hover:bg-slate-100 focus-visible:ring-slate-200 disabled:opacity-60",
      };
      const sizes = {
        sm: "text-sm px-3 py-1.5",
        md: "text-base px-4 py-2.5",
        lg: "text-lg px-8 py-4",
      };
      return (
        <button
          type="button"
          disabled={disabled}
          onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    /** 카드 래퍼 */
    function Card({ className = "", children, ...rest }) {
      return (
        <div
          className={`bg-white/90 backdrop-blur rounded-3xl shadow-xl shadow-slate-300/30 ${className}`}
          {...rest}
        >
          {children}
        </div>
      );
    }

    /** 세그먼트 컨트롤 (API 선택) */
    function SegmentedControl({ options, value, onChange, disabled = false }) {
      return (
        <div
          role="tablist"
          aria-label="API 선택"
          className="flex flex-wrap gap-1 p-1 bg-slate-100 rounded-2xl"
        >
          {options.map((opt) => {
            const active = opt.id === value;
            return (
              <button
                key={opt.id}
                role="tab"
                aria-selected={active}
                disabled={disabled}
                onClick={() => onChange(opt.id)}
                className={`flex-1 min-w-[110px] flex items-center justify-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold transition-all duration-200 disabled:cursor-not-allowed disabled:opacity-60 ${
                  active
                    ? "bg-white text-indigo-600 shadow-sm"
                    : "text-slate-500 hover:text-slate-700"
                }`}
              >
                <span aria-hidden="true">{opt.emoji}</span>
                <span>{opt.label}</span>
              </button>
            );
          })}
        </div>
      );
    }

    // ========================================
    // 🛠️ API 설정 & 헬퍼
    // ========================================

    // 인증키가 필요 없고 CORS가 허용된 무료 공개 API 목록
    const APIS = {
      dog: {
        id: "dog",
        label: "강아지 사진",
        emoji: "🐶",
        title: "랜덤 강아지 사진",
        url: "https://dog.ceo/api/breeds/image/random",
        kind: "image",
        // 응답에서 화면에 보여줄 값을 추출
        extract: (data) => data.message,
      },
      advice: {
        id: "advice",
        label: "랜덤 조언",
        emoji: "💡",
        title: "오늘의 조언",
        url: "https://api.adviceslip.com/advice",
        kind: "text",
        extract: (data) => data.slip && data.slip.advice,
      },
      catfact: {
        id: "catfact",
        label: "고양이 사실",
        emoji: "🐱",
        title: "랜덤 고양이 상식",
        url: "https://catfact.ninja/fact",
        kind: "text",
        extract: (data) => data.fact,
      },
    };

    const API_OPTIONS = Object.values(APIS).map(({ id, label, emoji }) => ({
      id,
      label,
      emoji,
    }));

    // ========================================
    // 🧩 결과 표시용 컴포넌트
    // ========================================

    /** 이미지 결과: 실제 로드 완료 전까지 플레이스홀더 표시 */
    function ImageResult({ src }) {
      const [loaded, setLoaded] = useState(false);
      const [imgError, setImgError] = useState(false);

      if (imgError) {
        return (
          <div className="rounded-2xl bg-amber-50 border border-amber-200 p-6 text-center text-amber-700">
            이미지를 불러오지 못했어요. 다시 시도해 주세요. 🙏
          </div>
        );
      }

      return (
        <div className="relative w-full overflow-hidden rounded-2xl bg-slate-100 min-h-[220px] flex items-center justify-center">
          {!loaded && (
            <div className="absolute inset-0 flex flex-col items-center justify-center gap-2 text-slate-400">
              <Spinner className="text-indigo-400" />
              <span className="text-sm">이미지 불러오는 중...</span>
            </div>
          )}
          <img
            src={src}
            alt="랜덤 강아지 사진"
            onLoad={() => setLoaded(true)}
            onError={() => setImgError(true)}
            className={`w-full max-h-[420px] object-contain transition-opacity duration-500 ${
              loaded ? "opacity-100" : "opacity-0"
            }`}
          />
        </div>
      );
    }

    /** 텍스트 결과: 큰 따옴표 스타일의 인용 카드 */
    function TextResult({ text, emoji }) {
      return (
        <blockquote className="relative rounded-2xl bg-gradient-to-br from-indigo-50 to-violet-50 border border-indigo-100 p-6 sm:p-8">
          <span className="absolute -top-3 left-4 text-5xl text-indigo-200 leading-none select-none" aria-hidden="true">
            &ldquo;
          </span>
          <p className="relative text-lg sm:text-xl text-slate-700 leading-relaxed font-medium">
            {text}
          </p>
          <div className="mt-3 text-right text-2xl" aria-hidden="true">
            {emoji}
          </div>
        </blockquote>
      );
    }

    /** 호출한 요청 URL 표시 */
    function RequestUrlBox({ method = "GET", url }) {
      return (
        <div className="flex items-center gap-2 rounded-xl bg-slate-900 px-3 py-2 overflow-x-auto">
          <span className="shrink-0 rounded-md bg-emerald-500/20 px-2 py-0.5 text-xs font-bold text-emerald-300">
            {method}
          </span>
          <code className="text-xs sm:text-sm text-slate-200 whitespace-nowrap font-mono">
            {url}
          </code>
        </div>
      );
    }

    /** 접을 수 있는 원본 JSON 보기 */
    function JsonViewer({ data }) {
      const [open, setOpen] = useState(false);
      return (
        <div className="rounded-xl border border-slate-200 overflow-hidden">
          <button
            type="button"
            onClick={() => setOpen((v) => !v)}
            aria-expanded={open}
            className="w-full flex items-center justify-between gap-2 px-4 py-2.5 bg-slate-50 hover:bg-slate-100 transition-colors text-sm font-semibold text-slate-600"
          >
            <span className="flex items-center gap-2">
              <span aria-hidden="true">{"{ }"}</span>
              응답(JSON) 보기
            </span>
            <svg
              className={`h-4 w-4 transition-transform duration-200 ${open ? "rotate-180" : ""}`}
              viewBox="0 0 20 20"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                fillRule="evenodd"
                d="M5.23 7.21a.75.75 0 011.06.02L10 11.17l3.71-3.94a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
                clipRule="evenodd"
              />
            </svg>
          </button>
          {open && (
            <pre className="m-0 max-h-72 overflow-auto bg-slate-900 px-4 py-3 text-xs sm:text-sm text-emerald-200 font-mono leading-relaxed animate-fade-in">
              {JSON.stringify(data, null, 2)}
            </pre>
          )}
        </div>
      );
    }

    // ========================================
    // 🚀 App 컴포넌트
    // ========================================

    function App() {
      const [selected, setSelected] = useState("dog"); // 기본값: 강아지 랜덤 사진
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      // result: { api, url, raw, value } 형태로 보관
      const [result, setResult] = useState(null);

      const inFlight = useRef(false); // 중복 클릭 방지용

      const api = APIS[selected];

      const callApi = useCallback(async () => {
        if (inFlight.current) return; // 요청 진행 중이면 무시
        inFlight.current = true;

        const target = APIS[selected];
        setLoading(true);
        setError(null);
        setResult(null);

        try {
          const res = await fetch(target.url);
          if (!res.ok) {
            throw new Error(`서버가 ${res.status} 상태로 응답했어요.`);
          }
          const raw = await res.json();
          const value = target.extract(raw);
          if (value == null) {
            throw new Error("응답에서 표시할 데이터를 찾지 못했어요.");
          }
          setResult({ api: target, url: target.url, raw, value });
        } catch (e) {
          // 네트워크 실패 / 파싱 실패 / 비정상 응답 모두 친절한 한국어로
          const msg =
            e instanceof TypeError
              ? "네트워크 연결에 문제가 있어요. 인터넷 상태를 확인해 주세요."
              : e.message || "알 수 없는 오류가 발생했어요.";
          setError({ message: msg, url: target.url });
        } finally {
          setLoading(false);
          inFlight.current = false;
        }
      }, [selected]);

      // API 종류를 바꾸면 이전 결과/에러를 초기화
      const handleSelect = (id) => {
        if (loading) return;
        setSelected(id);
        setResult(null);
        setError(null);
      };

      return (
        <div className="min-h-screen flex flex-col items-center px-4 py-10 sm:py-16">
          {/* 헤더 */}
          <header className="text-center mb-8 max-w-2xl">
            <div className="inline-flex items-center gap-2 rounded-full bg-white/70 px-4 py-1.5 text-sm font-semibold text-indigo-600 shadow-sm mb-4">
              <span aria-hidden="true">🌐</span> 프론트엔드 학습 데모
            </div>
            <h1 className="text-3xl sm:text-4xl font-extrabold text-slate-800 tracking-tight">
              API 호출 데모
            </h1>
            <p className="mt-3 text-slate-500 text-base sm:text-lg">
              버튼 하나로 공개 API를 호출하고, 결과와 원본 응답을 확인해 보세요.
            </p>
          </header>

          {/* 메인 카드 */}
          <Card className="w-full max-w-xl p-6 sm:p-8">
            {/* API 선택 */}
            <div className="mb-5">
              <label className="block text-sm font-semibold text-slate-500 mb-2">
                API 선택
              </label>
              <SegmentedControl
                options={API_OPTIONS}
                value={selected}
                onChange={handleSelect}
                disabled={loading}
              />
              <p className="mt-2 text-sm text-slate-400">
                선택: <span className="font-semibold text-slate-600">{api.title}</span>
              </p>
            </div>

            {/* 메인 호출 버튼 */}
            <Button
              variant="primary"
              size="lg"
              onClick={callApi}
              disabled={loading}
              className="w-full"
              aria-busy={loading}
            >
              {loading ? (
                <>
                  <Spinner />
                  호출하는 중...
                </>
              ) : (
                <>
                  <svg className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path
                      fillRule="evenodd"
                      d="M5 10a.75.75 0 01.75-.75h6.638L10.23 7.29a.75.75 0 111.04-1.08l3.5 3.25a.75.75 0 010 1.08l-3.5 3.25a.75.75 0 11-1.04-1.08l2.158-1.96H5.75A.75.75 0 015 10z"
                      clipRule="evenodd"
                    />
                  </svg>
                  API 호출하기
                </>
              )}
            </Button>

            {/* 결과 영역 */}
            <div className="mt-6">
              {/* 초기/빈 상태 */}
              {!loading && !result && !error && (
                <div className="rounded-2xl border-2 border-dashed border-slate-200 py-12 text-center">
                  <div className="text-4xl mb-3" aria-hidden="true">👆</div>
                  <p className="text-slate-400 font-medium">
                    버튼을 눌러 API를 호출해 보세요
                  </p>
                </div>
              )}

              {/* 로딩 상태 (스켈레톤) */}
              {loading && (
                <div className="rounded-2xl bg-slate-100 py-16 flex flex-col items-center justify-center gap-3 animate-fade-in">
                  <Spinner size="md" className="text-indigo-400" />
                  <span className="text-sm text-slate-400">데이터를 가져오는 중이에요...</span>
                </div>
              )}

              {/* 에러 상태 */}
              {!loading && error && (
                <div className="animate-pop-in rounded-2xl border border-rose-200 bg-rose-50 p-6 text-center">
                  <div className="text-3xl mb-2" aria-hidden="true">😢</div>
                  <p className="font-semibold text-rose-700">요청에 실패했어요</p>
                  <p className="mt-1 text-sm text-rose-500">{error.message}</p>
                  <div className="mt-4">
                    <Button variant="secondary" size="md" onClick={callApi}>
                      <svg className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path
                          fillRule="evenodd"
                          d="M15.312 5.312A7 7 0 003.06 8.5a.75.75 0 11-1.44-.42 8.5 8.5 0 0114.79-3.04V3.25a.75.75 0 011.5 0v3.5a.75.75 0 01-.75.75h-3.5a.75.75 0 010-1.5h1.602zM4.688 14.688A7 7 0 0016.94 11.5a.75.75 0 111.44.42 8.5 8.5 0 01-14.79 3.04v1.79a.75.75 0 01-1.5 0v-3.5a.75.75 0 01.75-.75h3.5a.75.75 0 010 1.5H4.688z"
                          clipRule="evenodd"
                        />
                      </svg>
                      다시 시도
                    </Button>
                  </div>
                </div>
              )}

              {/* 성공 상태 */}
              {!loading && result && (
                <div className="animate-pop-in space-y-4">
                  {/* 결과 본문 */}
                  {result.api.kind === "image" ? (
                    <ImageResult src={result.value} />
                  ) : (
                    <TextResult text={result.value} emoji={result.api.emoji} />
                  )}

                  {/* 교육용: 호출한 요청 URL */}
                  <div>
                    <p className="text-xs font-semibold text-slate-400 mb-1.5">
                      호출한 요청
                    </p>
                    <RequestUrlBox method="GET" url={result.url} />
                  </div>

                  {/* 교육용: 원본 JSON */}
                  <JsonViewer data={result.raw} />
                </div>
              )}
            </div>
          </Card>

          {/* 푸터 */}
          <footer className="mt-8 text-center text-xs text-slate-400">
            <p>
              인증키가 필요 없는 무료 공개 API(dog.ceo · adviceslip · catfact)를 사용합니다.
            </p>
          </footer>
        </div>
      );
    }

    // ========================================
    // 렌더링
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
