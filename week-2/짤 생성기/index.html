<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>짤 생성기 — 이미지 위에 텍스트 배치</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Canvas 캡처 영역에서 사용자 선택/드래그 고스트 방지 */
    .no-select { -webkit-user-select: none; user-select: none; }
    .text-layer { cursor: grab; }
    .text-layer.dragging { cursor: grabbing; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useRef, useEffect, useCallback } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Button({ variant = 'primary', size = 'md', disabled, onClick, className = '', children, ...rest }) {
      const variants = {
        primary: 'bg-indigo-600 hover:bg-indigo-700 text-white',
        secondary: 'bg-slate-200 hover:bg-slate-300 text-slate-800',
        danger: 'bg-rose-500 hover:bg-rose-600 text-white',
        ghost: 'bg-transparent hover:bg-slate-100 text-slate-700',
      };
      const sizes = { sm: 'px-2.5 py-1 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-5 py-2.5 text-base' };
      return (
        <button
          type="button"
          onClick={onClick}
          disabled={disabled}
          className={`rounded-lg font-medium transition-colors disabled:opacity-40 disabled:cursor-not-allowed ${variants[variant]} ${sizes[size]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Field({ label, children, className = '' }) {
      return (
        <label className={`block ${className}`}>
          <span className="block text-xs font-semibold text-slate-500 mb-1">{label}</span>
          {children}
        </label>
      );
    }

    function Slider({ label, value, min, max, step = 1, unit = '', onChange }) {
      return (
        <div>
          <div className="flex justify-between items-center mb-1">
            <span className="text-xs font-semibold text-slate-500">{label}</span>
            <span className="text-xs font-mono text-slate-700">{value}{unit}</span>
          </div>
          <input
            type="range"
            min={min}
            max={max}
            step={step}
            value={value}
            onChange={(e) => onChange(parseFloat(e.target.value))}
            className="w-full accent-indigo-600"
          />
        </div>
      );
    }

    function Card({ className = '', children }) {
      return <div className={`bg-white rounded-2xl shadow-sm border border-slate-200 ${className}`}>{children}</div>;
    }

    // ========================================
    // 🧰 상수 & 유틸
    // ========================================
    const FONTS = [
      { label: '고딕 (sans-serif)', value: 'sans-serif' },
      { label: '명조 (serif)', value: 'serif' },
      { label: '고정폭 (monospace)', value: 'monospace' },
    ];

    function createTextLayer(text = '텍스트를 입력하세요') {
      return {
        id: 'L' + Math.random().toString(36).slice(2, 9),
        text,
        // 위치는 표시 영역 기준 비율(0~1) — 다양한 캔버스 크기에서 일관되게 동작
        xRatio: 0.5,
        yRatio: 0.5,
        fontSize: 48,       // 원본 이미지 폭 1000px 기준 px
        color: '#ffffff',
        fontFamily: 'sans-serif',
        bold: true,
        align: 'center',
        strokeWidth: 6,     // 외곽선 두께 (가독성)
        strokeColor: '#000000',
        rotation: 0,
      };
    }

    // ========================================
    // 🖼️ 미리보기 + 드래그 캔버스
    // ========================================
    function PreviewStage({ image, layers, selectedId, onSelect, onMove, stageRef }) {
      const containerRef = useRef(null);
      const dragState = useRef(null);

      const handlePointerDown = (e, layer) => {
        e.stopPropagation();
        onSelect(layer.id);
        const rect = containerRef.current.getBoundingClientRect();
        dragState.current = {
          id: layer.id,
          rect,
          offsetX: e.clientX - (rect.left + layer.xRatio * rect.width),
          offsetY: e.clientY - (rect.top + layer.yRatio * rect.height),
        };
        e.currentTarget.setPointerCapture(e.pointerId);
        e.currentTarget.classList.add('dragging');
      };

      const handlePointerMove = (e) => {
        const ds = dragState.current;
        if (!ds) return;
        const x = (e.clientX - ds.offsetX - ds.rect.left) / ds.rect.width;
        const y = (e.clientY - ds.offsetY - ds.rect.top) / ds.rect.height;
        onMove(ds.id, Math.min(1, Math.max(0, x)), Math.min(1, Math.max(0, y)));
      };

      const handlePointerUp = (e) => {
        dragState.current = null;
        e.currentTarget.classList.remove('dragging');
      };

      if (!image) {
        return (
          <div className="aspect-video w-full rounded-xl border-2 border-dashed border-slate-300 flex items-center justify-center text-slate-400 text-sm">
            이미지를 업로드하면 여기에 미리보기가 표시됩니다
          </div>
        );
      }

      // 표시 폭 대비 원본 폭 비율 → fontSize/stroke 스케일 (원본 1000px 기준 → 표시 영역 px)
      return (
        <div
          ref={(el) => { containerRef.current = el; if (stageRef) stageRef.current = el; }}
          onClick={() => onSelect(null)}
          className="relative w-full overflow-hidden rounded-xl bg-slate-900 no-select select-none"
          style={{ lineHeight: 0 }}
        >
          <img src={image.src} alt="배경" className="w-full h-auto block pointer-events-none" draggable="false" />
          {layers.map((layer) => {
            const selected = layer.id === selectedId;
            // 표시 폭(px) 기준으로 fontSize 환산: 원본폭 1000 기준 값을 표시폭에 맞게
            const displayWidth = containerRef.current ? containerRef.current.getBoundingClientRect().width : 1000;
            const scale = displayWidth / 1000;
            return (
              <div
                key={layer.id}
                className={`text-layer absolute whitespace-pre ${selected ? 'ring-2 ring-indigo-400 ring-offset-1' : ''}`}
                style={{
                  left: `${layer.xRatio * 100}%`,
                  top: `${layer.yRatio * 100}%`,
                  transform: `translate(-50%, -50%) rotate(${layer.rotation}deg)`,
                  fontSize: `${layer.fontSize * scale}px`,
                  color: layer.color,
                  fontFamily: layer.fontFamily,
                  fontWeight: layer.bold ? 700 : 400,
                  textAlign: layer.align,
                  WebkitTextStroke: layer.strokeWidth > 0 ? `${layer.strokeWidth * scale}px ${layer.strokeColor}` : 'none',
                  paintOrder: 'stroke fill',
                  lineHeight: 1.2,
                  padding: '2px 6px',
                }}
                onPointerDown={(e) => handlePointerDown(e, layer)}
                onPointerMove={handlePointerMove}
                onPointerUp={handlePointerUp}
              >
                {layer.text || ' '}
              </div>
            );
          })}
        </div>
      );
    }

    // ========================================
    // 🎛️ 레이어 편집 패널
    // ========================================
    function LayerEditor({ layer, onChange, onDelete }) {
      if (!layer) {
        return (
          <Card className="p-5 text-sm text-slate-400 text-center">
            텍스트 레이어를 선택하거나 추가하세요
          </Card>
        );
      }
      const up = (patch) => onChange({ ...layer, ...patch });
      return (
        <Card className="p-5 space-y-4">
          <div className="flex items-center justify-between">
            <h3 className="font-bold text-slate-800">텍스트 편집</h3>
            <Button variant="danger" size="sm" onClick={() => onDelete(layer.id)}>삭제</Button>
          </div>

          <Field label="내용">
            <textarea
              value={layer.text}
              onChange={(e) => up({ text: e.target.value })}
              rows={2}
              className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
              placeholder="여러 줄 입력 가능"
            />
          </Field>

          <div className="grid grid-cols-2 gap-3">
            <Field label="글꼴">
              <select
                value={layer.fontFamily}
                onChange={(e) => up({ fontFamily: e.target.value })}
                className="w-full rounded-lg border border-slate-300 px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
              >
                {FONTS.map((f) => <option key={f.value} value={f.value}>{f.label}</option>)}
              </select>
            </Field>
            <Field label="정렬">
              <div className="flex gap-1">
                {['left', 'center', 'right'].map((a) => (
                  <button
                    key={a}
                    onClick={() => up({ align: a })}
                    className={`flex-1 rounded-lg border px-2 py-2 text-sm ${layer.align === a ? 'bg-indigo-600 text-white border-indigo-600' : 'border-slate-300 text-slate-600'}`}
                  >
                    {a === 'left' ? '좌' : a === 'center' ? '중' : '우'}
                  </button>
                ))}
              </div>
            </Field>
          </div>

          <Slider label="크기" value={layer.fontSize} min={12} max={200} unit="px" onChange={(v) => up({ fontSize: v })} />
          <Slider label="외곽선 두께" value={layer.strokeWidth} min={0} max={20} unit="px" onChange={(v) => up({ strokeWidth: v })} />
          <Slider label="회전" value={layer.rotation} min={-180} max={180} unit="°" onChange={(v) => up({ rotation: v })} />

          <div className="grid grid-cols-2 gap-3">
            <Field label="글자 색">
              <input type="color" value={layer.color} onChange={(e) => up({ color: e.target.value })} className="w-full h-10 rounded-lg border border-slate-300 cursor-pointer" />
            </Field>
            <Field label="외곽선 색">
              <input type="color" value={layer.strokeColor} onChange={(e) => up({ strokeColor: e.target.value })} className="w-full h-10 rounded-lg border border-slate-300 cursor-pointer" />
            </Field>
          </div>

          <label className="flex items-center gap-2 text-sm text-slate-700">
            <input type="checkbox" checked={layer.bold} onChange={(e) => up({ bold: e.target.checked })} className="accent-indigo-600 w-4 h-4" />
            굵게 (Bold)
          </label>
        </Card>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [image, setImage] = useState(null); // { src, width, height, el }
      const [layers, setLayers] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const fileInputRef = useRef(null);
      const stageRef = useRef(null);

      const selectedLayer = layers.find((l) => l.id === selectedId) || null;

      const handleFile = (file) => {
        if (!file || !file.type.startsWith('image/')) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          setImage({ src: url, width: img.naturalWidth, height: img.naturalHeight, el: img });
          if (layers.length === 0) {
            const l = createTextLayer('짤 만들기 시작!');
            setLayers([l]);
            setSelectedId(l.id);
          }
        };
        img.src = url;
      };

      const onDrop = (e) => {
        e.preventDefault();
        handleFile(e.dataTransfer.files[0]);
      };

      const addLayer = () => {
        const l = createTextLayer();
        setLayers((prev) => [...prev, l]);
        setSelectedId(l.id);
      };

      const updateLayer = (next) => setLayers((prev) => prev.map((l) => (l.id === next.id ? next : l)));
      const moveLayer = useCallback((id, xRatio, yRatio) => {
        setLayers((prev) => prev.map((l) => (l.id === id ? { ...l, xRatio, yRatio } : l)));
      }, []);
      const deleteLayer = (id) => {
        setLayers((prev) => prev.filter((l) => l.id !== id));
        setSelectedId(null);
      };

      // ===== Canvas 렌더링 & 다운로드 =====
      const download = () => {
        if (!image) return;
        const canvas = document.createElement('canvas');
        canvas.width = image.width;
        canvas.height = image.height;
        const ctx = canvas.getContext('2d');

        // 배경 이미지
        ctx.drawImage(image.el, 0, 0, image.width, image.height);

        // 원본 폭 1000px 기준으로 정의된 fontSize/stroke를 실제 폭에 맞게 스케일
        const scale = image.width / 1000;

        layers.forEach((layer) => {
          const fontSize = layer.fontSize * scale;
          const stroke = layer.strokeWidth * scale;
          const cx = layer.xRatio * image.width;
          const cy = layer.yRatio * image.height;

          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate((layer.rotation * Math.PI) / 180);
          ctx.font = `${layer.bold ? '700' : '400'} ${fontSize}px ${layer.fontFamily}`;
          ctx.textAlign = layer.align;
          ctx.textBaseline = 'middle';
          ctx.lineJoin = 'round';
          ctx.miterLimit = 2;

          const lines = (layer.text || ' ').split('\n');
          const lineHeight = fontSize * 1.2;
          const totalH = lineHeight * lines.length;
          const startY = -totalH / 2 + lineHeight / 2;

          lines.forEach((line, i) => {
            const y = startY + i * lineHeight;
            if (stroke > 0) {
              ctx.strokeStyle = layer.strokeColor;
              ctx.lineWidth = stroke;
              ctx.strokeText(line, 0, y);
            }
            ctx.fillStyle = layer.color;
            ctx.fillText(line, 0, y);
          });
          ctx.restore();
        });

        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `짤_${Date.now()}.png`;
          a.click();
          URL.revokeObjectURL(url);
        }, 'image/png');
      };

      const reset = () => {
        setImage(null);
        setLayers([]);
        setSelectedId(null);
      };

      return (
        <div className="min-h-screen">
          {/* 헤더 */}
          <header className="bg-white border-b border-slate-200">
            <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className="text-2xl">🖼️</span>
                <div>
                  <h1 className="text-lg font-bold text-slate-800">짤 생성기</h1>
                  <p className="text-xs text-slate-500">이미지 위에 텍스트를 배치하고 PNG로 다운로드</p>
                </div>
              </div>
              <div className="flex gap-2">
                {image && <Button variant="secondary" size="sm" onClick={reset}>초기화</Button>}
                <Button size="sm" onClick={download} disabled={!image}>⬇️ 다운로드</Button>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
            {/* 좌측: 미리보기 */}
            <section className="lg:col-span-2 space-y-4">
              <Card className="p-4">
                {!image ? (
                  <div
                    onDrop={onDrop}
                    onDragOver={(e) => e.preventDefault()}
                    onClick={() => fileInputRef.current.click()}
                    className="aspect-video w-full rounded-xl border-2 border-dashed border-slate-300 hover:border-indigo-400 hover:bg-indigo-50/50 transition-colors flex flex-col items-center justify-center text-slate-400 cursor-pointer gap-2"
                  >
                    <span className="text-4xl">📁</span>
                    <p className="text-sm font-medium text-slate-600">클릭하거나 이미지를 드래그하세요</p>
                    <p className="text-xs">PNG · JPG · GIF · WebP</p>
                  </div>
                ) : (
                  <PreviewStage
                    image={image}
                    layers={layers}
                    selectedId={selectedId}
                    onSelect={setSelectedId}
                    onMove={moveLayer}
                    stageRef={stageRef}
                  />
                )}
                <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={(e) => handleFile(e.target.files[0])} />
              </Card>

              {image && (
                <p className="text-xs text-slate-400 text-center">
                  💡 텍스트를 마우스로 드래그해서 위치를 옮길 수 있어요 · 원본 크기 {image.width}×{image.height}px로 저장됩니다
                </p>
              )}
            </section>

            {/* 우측: 컨트롤 */}
            <aside className="space-y-4">
              <Card className="p-4">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="font-bold text-slate-800 text-sm">레이어 ({layers.length})</h2>
                  <Button size="sm" onClick={addLayer} disabled={!image}>+ 텍스트 추가</Button>
                </div>
                {layers.length === 0 ? (
                  <p className="text-xs text-slate-400 text-center py-2">아직 텍스트가 없습니다</p>
                ) : (
                  <ul className="space-y-1.5 max-h-40 overflow-auto">
                    {layers.map((l) => (
                      <li
                        key={l.id}
                        onClick={() => setSelectedId(l.id)}
                        className={`px-3 py-2 rounded-lg text-sm cursor-pointer truncate ${l.id === selectedId ? 'bg-indigo-100 text-indigo-700 font-medium' : 'bg-slate-50 text-slate-600 hover:bg-slate-100'}`}
                      >
                        {l.text.split('\n')[0] || '(빈 텍스트)'}
                      </li>
                    ))}
                  </ul>
                )}
              </Card>

              <LayerEditor layer={selectedLayer} onChange={updateLayer} onDelete={deleteLayer} />
            </aside>
          </main>

          <footer className="text-center text-xs text-slate-400 py-6">
            Canvas 기반 · 모든 처리는 브라우저에서 이루어집니다 (이미지 업로드 없음)
          </footer>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
