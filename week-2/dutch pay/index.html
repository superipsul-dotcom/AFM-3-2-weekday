<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>더치페이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Tailwind으로 표현하기 어려운 부드러운 등장 애니메이션만 별도 정의 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out both; }
    /* number input 화살표 제거 */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ========================================
    // 🎨 Design System Components (순수 표현용, 비즈니스 로직 없음)
    // ========================================

    function Button({ variant = "primary", size = "md", className = "", children, ...props }) {
      const variants = {
        primary: "bg-indigo-600 hover:bg-indigo-700 text-white shadow-sm",
        secondary: "bg-white hover:bg-slate-50 text-slate-700 border border-slate-300",
        danger: "bg-rose-50 hover:bg-rose-100 text-rose-600 border border-rose-200",
        ghost: "bg-transparent hover:bg-slate-100 text-slate-500",
      };
      const sizes = {
        sm: "px-2.5 py-1 text-sm",
        md: "px-4 py-2 text-sm",
        lg: "px-5 py-2.5 text-base",
      };
      return (
        <button
          className={`inline-flex items-center justify-center gap-1 rounded-lg font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${sizes[size]} ${className}`}
          {...props}
        >
          {children}
        </button>
      );
    }

    function Input({ label, error, className = "", prefix, suffix, ...props }) {
      return (
        <label className="block">
          {label && <span className="mb-1 block text-xs font-medium text-slate-500">{label}</span>}
          <div className="relative flex items-center">
            {prefix && <span className="absolute left-3 text-sm text-slate-400">{prefix}</span>}
            <input
              className={`w-full rounded-lg border bg-white px-3 py-2 text-sm text-slate-800 placeholder-slate-300 transition focus:outline-none focus:ring-2 focus:ring-indigo-400 ${prefix ? "pl-7" : ""} ${suffix ? "pr-9" : ""} ${error ? "border-rose-300" : "border-slate-300"} ${className}`}
              {...props}
            />
            {suffix && <span className="absolute right-3 text-sm text-slate-400">{suffix}</span>}
          </div>
          {error && <span className="mt-1 block text-xs text-rose-500">{error}</span>}
        </label>
      );
    }

    function Card({ className = "", children }) {
      return (
        <div className={`rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200/60 ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ color = "indigo", children }) {
      const colors = {
        indigo: "bg-indigo-50 text-indigo-600",
        emerald: "bg-emerald-50 text-emerald-600",
        amber: "bg-amber-50 text-amber-600",
        slate: "bg-slate-100 text-slate-500",
      };
      return (
        <span className={`inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold ${colors[color]}`}>
          {children}
        </span>
      );
    }

    // 숫자를 1,000원 형태로 포맷 (음수 0 보정 포함)
    const won = (n) => `${Math.round(n).toLocaleString("ko-KR")}원`;

    // ========================================
    // 🧮 계산 로직 (배열 / 반복문 / 조건분기를 적극 사용)
    // ========================================
    //
    // people: 배열(array) — 참가자 목록
    //   각 participant = { id, name, items: 배열[ { id, name, price } ] }
    //
    function calculate(people, mode, discountType, discountValue) {
      // [반복문 - reduce] 각 사람이 주문한 메뉴 가격을 합산해 개인 소계를 구한다.
      const subtotals = people.map((person) => {
        // [반복문 - reduce] items 배열을 순회하며 가격 누적
        const personTotal = person.items.reduce((sum, item) => {
          const price = Number(item.price) || 0;
          return sum + price;
        }, 0);
        return { id: person.id, name: person.name, menuTotal: personTotal };
      });

      // [반복문 - reduce] 전체 메뉴 합계 (할인 전 총액)
      const menuGrandTotal = subtotals.reduce((sum, p) => sum + p.menuTotal, 0);
      const headCount = people.length;

      // [조건분기 - if/else] 분배 모드에 따라 각자 부담할 "할인 전" 금액을 다르게 계산
      let preDiscountShares;
      if (mode === "equal") {
        // 균등 분배: 총액을 인원수로 나눠 모두 동일 금액
        const each = headCount > 0 ? menuGrandTotal / headCount : 0;
        preDiscountShares = subtotals.map((p) => ({ ...p, share: each }));
      } else {
        // 메뉴별 분배: 각자 주문한 만큼만 부담
        preDiscountShares = subtotals.map((p) => ({ ...p, share: p.menuTotal }));
      }

      // [조건분기 - if/else] 할인 종류에 따라 전체 할인 금액 결정
      let discountAmount = 0;
      const dv = Number(discountValue) || 0;
      if (discountType === "percent") {
        // 퍼센트 할인: 총액의 dv% (0~100 범위로 보정)
        const pct = Math.min(Math.max(dv, 0), 100);
        discountAmount = menuGrandTotal * (pct / 100);
      } else if (discountType === "amount") {
        // 정액 할인: dv원, 단 총액을 넘지 않도록 보정
        discountAmount = Math.min(dv, menuGrandTotal);
      } else {
        // 할인 없음
        discountAmount = 0;
      }

      const finalTotal = menuGrandTotal - discountAmount;

      // [반복문 - map] 각 사람의 share 비율만큼 할인을 비례 배분 → 최종 금액 산출
      const results = preDiscountShares.map((p) => {
        // 비율(ratio): 이 사람의 부담액 / 전체 부담액
        const ratio = menuGrandTotal > 0 ? p.share / menuGrandTotal : (headCount > 0 ? 1 / headCount : 0);
        const personDiscount = discountAmount * ratio;
        const payable = p.share - personDiscount;
        return {
          ...p,
          discount: personDiscount,
          payable: Math.max(payable, 0),
        };
      });

      return {
        results,           // 배열: 각자 최종 결과
        menuGrandTotal,    // 할인 전 총액
        discountAmount,    // 적용된 할인액
        finalTotal,        // 할인 후 총액
        headCount,
      };
    }

    // ========================================
    // 🧩 하위 컴포넌트
    // ========================================

    // 한 명의 참가자 카드 (이름 + 메뉴 목록 편집)
    function PersonEditor({ person, index, mode, onChangeName, onAddItem, onChangeItem, onRemoveItem, onRemovePerson }) {
      // [반복문 - reduce] 이 사람의 메뉴 합계 (화면 표시용)
      const personSum = person.items.reduce((s, it) => s + (Number(it.price) || 0), 0);

      return (
        <Card className="animate-fade-in-up">
          <div className="mb-3 flex items-center gap-2">
            <span className="flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-indigo-100 text-xs font-bold text-indigo-600">
              {index + 1}
            </span>
            <input
              value={person.name}
              onChange={(e) => onChangeName(person.id, e.target.value)}
              placeholder="이름"
              className="min-w-0 flex-1 rounded-lg border border-slate-200 px-3 py-1.5 text-sm font-semibold text-slate-800 focus:border-indigo-300 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            />
            <Badge color="slate">{won(personSum)}</Badge>
            <Button variant="ghost" size="sm" onClick={() => onRemovePerson(person.id)} title="참가자 삭제" aria-label="참가자 삭제">✕</Button>
          </div>

          {/* 메뉴별 분배 모드일 때만 메뉴 입력 UI 노출 */}
          {mode === "menu" ? (
            <div className="space-y-2">
              {/* [조건분기] 메뉴가 비어있으면 빈 상태 안내 */}
              {person.items.length === 0 ? (
                <p className="rounded-lg bg-slate-50 px-3 py-2 text-center text-xs text-slate-400">
                  주문한 메뉴를 추가하세요
                </p>
              ) : (
                // [반복문 - map] 메뉴 배열을 순회하며 입력 행 렌더링
                person.items.map((item) => (
                  <div key={item.id} className="flex items-center gap-2">
                    <input
                      value={item.name}
                      onChange={(e) => onChangeItem(person.id, item.id, "name", e.target.value)}
                      placeholder="메뉴명"
                      className="min-w-0 flex-1 rounded-lg border border-slate-200 px-3 py-1.5 text-sm focus:border-indigo-300 focus:outline-none focus:ring-1 focus:ring-indigo-300"
                    />
                    <div className="relative w-28 shrink-0">
                      <input
                        type="number"
                        min="0"
                        value={item.price}
                        onChange={(e) => onChangeItem(person.id, item.id, "price", e.target.value)}
                        placeholder="0"
                        className="w-full rounded-lg border border-slate-200 py-1.5 pl-3 pr-7 text-right text-sm focus:border-indigo-300 focus:outline-none focus:ring-1 focus:ring-indigo-300"
                      />
                      <span className="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-slate-400">원</span>
                    </div>
                    <Button variant="ghost" size="sm" onClick={() => onRemoveItem(person.id, item.id)} title="메뉴 삭제" aria-label="메뉴 삭제">✕</Button>
                  </div>
                ))
              )}
              <Button variant="secondary" size="sm" className="w-full" onClick={() => onAddItem(person.id)}>
                + 메뉴 추가
              </Button>
            </div>
          ) : (
            <p className="rounded-lg bg-indigo-50/50 px-3 py-2 text-center text-xs text-indigo-400">
              균등 분배 모드에서는 메뉴 입력이 필요 없어요
            </p>
          )}
        </Card>
      );
    }

    // ========================================
    // 📄 메인 페이지
    // ========================================
    function DutchPayApp() {
      // [배열 state] 참가자 목록 — 초기 2명
      const [people, setPeople] = useState([
        { id: 1, name: "김철수", items: [{ id: 11, name: "삼겹살", price: 16000 }] },
        { id: 2, name: "이영희", items: [{ id: 21, name: "냉면", price: 9000 }] },
      ]);

      const [mode, setMode] = useState("menu");          // "equal" | "menu"
      const [discountType, setDiscountType] = useState("none"); // "none" | "percent" | "amount"
      const [discountValue, setDiscountValue] = useState("");

      // 균등분배일 때 사용할 "균등 총액" (메뉴 입력 없이 총액만 받고 싶을 때를 위한 보조)
      // 여기서는 메뉴 합계를 그대로 총액으로 쓰되, 균등모드에서도 메뉴합을 총액으로 사용한다.

      // 고유 id 생성기
      const newId = () => Date.now() + Math.floor(Math.random() * 1000);

      // --- 참가자 조작 (배열 불변성 유지) ---
      const addPerson = () => {
        setPeople((prev) => [...prev, { id: newId(), name: "", items: [] }]);
      };
      const removePerson = (pid) => {
        // [반복문 - filter] 해당 id를 제외한 새 배열 생성
        setPeople((prev) => prev.filter((p) => p.id !== pid));
      };
      const changeName = (pid, name) => {
        setPeople((prev) => prev.map((p) => (p.id === pid ? { ...p, name } : p)));
      };

      // --- 메뉴 조작 ---
      const addItem = (pid) => {
        setPeople((prev) =>
          prev.map((p) =>
            p.id === pid ? { ...p, items: [...p.items, { id: newId(), name: "", price: "" }] } : p
          )
        );
      };
      const changeItem = (pid, iid, field, value) => {
        setPeople((prev) =>
          prev.map((p) =>
            p.id === pid
              ? {
                  ...p,
                  // [반복문 - map] items 배열에서 해당 메뉴만 수정
                  items: p.items.map((it) => (it.id === iid ? { ...it, [field]: value } : it)),
                }
              : p
          )
        );
      };
      const removeItem = (pid, iid) => {
        setPeople((prev) =>
          prev.map((p) =>
            p.id === pid ? { ...p, items: p.items.filter((it) => it.id !== iid) } : p
          )
        );
      };

      // 계산 결과 (입력이 바뀔 때마다 자동 재계산)
      const calc = useMemo(
        () => calculate(people, mode, discountType, discountValue),
        [people, mode, discountType, discountValue]
      );

      const hasPeople = people.length > 0;

      return (
        <div className="mx-auto max-w-5xl px-4 py-8 sm:py-10">
          {/* 헤더 */}
          <header className="mb-8 text-center">
            <h1 className="text-2xl font-extrabold tracking-tight text-slate-800 sm:text-3xl">
              💸 더치페이 계산기
            </h1>
            <p className="mt-2 text-sm text-slate-500">
              인원 · 메뉴 · 할인을 각각 입력하면 한 명씩 낼 금액을 계산해 드려요
            </p>
          </header>

          <div className="grid gap-6 lg:grid-cols-5">
            {/* 왼쪽: 입력 영역 */}
            <div className="space-y-6 lg:col-span-3">
              {/* 분배 모드 토글 */}
              <Card>
                <h2 className="mb-3 text-sm font-bold text-slate-700">1. 분배 방식 선택</h2>
                <div className="grid grid-cols-2 gap-2">
                  <button
                    onClick={() => setMode("equal")}
                    className={`rounded-xl border px-3 py-3 text-left transition ${
                      mode === "equal"
                        ? "border-indigo-500 bg-indigo-50 ring-2 ring-indigo-200"
                        : "border-slate-200 bg-white hover:bg-slate-50"
                    }`}
                  >
                    <div className="text-sm font-bold text-slate-800">균등 분배</div>
                    <div className="mt-0.5 text-xs text-slate-500">총액 ÷ 인원수</div>
                  </button>
                  <button
                    onClick={() => setMode("menu")}
                    className={`rounded-xl border px-3 py-3 text-left transition ${
                      mode === "menu"
                        ? "border-indigo-500 bg-indigo-50 ring-2 ring-indigo-200"
                        : "border-slate-200 bg-white hover:bg-slate-50"
                    }`}
                  >
                    <div className="text-sm font-bold text-slate-800">메뉴별 분배</div>
                    <div className="mt-0.5 text-xs text-slate-500">각자 먹은 만큼</div>
                  </button>
                </div>
              </Card>

              {/* 참가자 + 메뉴 */}
              <div>
                <div className="mb-3 flex items-center justify-between">
                  <h2 className="text-sm font-bold text-slate-700">
                    2. 참가자 ({people.length}명)
                  </h2>
                  <Button size="sm" onClick={addPerson}>+ 인원 추가</Button>
                </div>

                {/* [조건분기] 참가자가 없으면 빈 상태 */}
                {!hasPeople ? (
                  <Card className="text-center">
                    <p className="py-6 text-sm text-slate-400">
                      참가자가 없습니다.<br />“인원 추가”를 눌러 시작하세요.
                    </p>
                  </Card>
                ) : (
                  <div className="space-y-3">
                    {/* [반복문 - map] 참가자 배열 렌더링 */}
                    {people.map((person, idx) => (
                      <PersonEditor
                        key={person.id}
                        person={person}
                        index={idx}
                        mode={mode}
                        onChangeName={changeName}
                        onAddItem={addItem}
                        onChangeItem={changeItem}
                        onRemoveItem={removeItem}
                        onRemovePerson={removePerson}
                      />
                    ))}
                  </div>
                )}
              </div>

              {/* 할인 */}
              <Card>
                <h2 className="mb-3 text-sm font-bold text-slate-700">3. 할인 적용</h2>
                <div className="mb-3 grid grid-cols-3 gap-2">
                  {[
                    { key: "none", label: "할인 없음" },
                    { key: "percent", label: "% 할인" },
                    { key: "amount", label: "원 할인" },
                  ].map((opt) => (
                    <button
                      key={opt.key}
                      onClick={() => setDiscountType(opt.key)}
                      className={`rounded-lg border px-2 py-2 text-sm font-medium transition ${
                        discountType === opt.key
                          ? "border-emerald-500 bg-emerald-50 text-emerald-700 ring-2 ring-emerald-200"
                          : "border-slate-200 bg-white text-slate-600 hover:bg-slate-50"
                      }`}
                    >
                      {opt.label}
                    </button>
                  ))}
                </div>

                {/* [조건분기] 할인 종류에 따라 입력 UI 다르게 표시 */}
                {discountType === "percent" && (
                  <Input
                    type="number" min="0" max="100"
                    value={discountValue}
                    onChange={(e) => setDiscountValue(e.target.value)}
                    placeholder="예: 10"
                    suffix="%"
                    label="할인율"
                  />
                )}
                {discountType === "amount" && (
                  <Input
                    type="number" min="0"
                    value={discountValue}
                    onChange={(e) => setDiscountValue(e.target.value)}
                    placeholder="예: 5000"
                    suffix="원"
                    label="할인 금액"
                  />
                )}
                {discountType === "none" && (
                  <p className="rounded-lg bg-slate-50 px-3 py-2 text-center text-xs text-slate-400">
                    할인이 적용되지 않습니다
                  </p>
                )}
              </Card>
            </div>

            {/* 오른쪽: 결과 영역 */}
            <div className="lg:col-span-2">
              <div className="sticky top-6 space-y-4">
                <Card className="bg-gradient-to-br from-indigo-600 to-violet-600 text-white ring-0">
                  <div className="flex items-center justify-between">
                    <span className="text-sm font-medium opacity-90">최종 결제 금액</span>
                    <Badge color="amber">{mode === "equal" ? "균등 분배" : "메뉴별 분배"}</Badge>
                  </div>
                  <div className="mt-1 text-3xl font-extrabold">{won(calc.finalTotal)}</div>
                  <div className="mt-3 space-y-1 text-sm">
                    <div className="flex justify-between opacity-90">
                      <span>할인 전 총액</span>
                      <span>{won(calc.menuGrandTotal)}</span>
                    </div>
                    <div className="flex justify-between opacity-90">
                      <span>할인 금액</span>
                      <span>- {won(calc.discountAmount)}</span>
                    </div>
                    <div className="flex justify-between border-t border-white/20 pt-1 font-bold">
                      <span>인원수</span>
                      <span>{calc.headCount}명</span>
                    </div>
                  </div>
                </Card>

                <Card>
                  <h2 className="mb-3 text-sm font-bold text-slate-700">한 명씩 낼 금액</h2>

                  {/* [조건분기] 결과 빈 상태 처리 */}
                  {calc.results.length === 0 ? (
                    <p className="py-6 text-center text-sm text-slate-400">
                      참가자를 추가하면<br />결과가 표시됩니다
                    </p>
                  ) : calc.menuGrandTotal === 0 ? (
                    <p className="py-6 text-center text-sm text-slate-400">
                      {mode === "menu"
                        ? "메뉴와 가격을 입력해 주세요"
                        : "메뉴 가격을 입력하면 균등 분배됩니다"}
                    </p>
                  ) : (
                    <ul className="space-y-2">
                      {/* [반복문 - map] 결과 배열 렌더링 */}
                      {calc.results.map((r) => (
                        <li
                          key={r.id}
                          className="flex items-center justify-between rounded-xl bg-slate-50 px-3 py-2.5"
                        >
                          <div className="min-w-0">
                            <div className="truncate text-sm font-semibold text-slate-800">
                              {r.name || "(이름 없음)"}
                            </div>
                            {/* [조건분기] 할인이 있을 때만 할인 내역 표시 */}
                            {calc.discountAmount > 0 && (
                              <div className="text-xs text-emerald-600">
                                할인 -{won(r.discount)}
                              </div>
                            )}
                          </div>
                          <div className="text-right">
                            <div className="text-base font-bold text-indigo-600">
                              {won(r.payable)}
                            </div>
                          </div>
                        </li>
                      ))}
                    </ul>
                  )}
                </Card>

                <p className="px-1 text-center text-xs text-slate-400">
                  ※ 원 단위 반올림으로 합계와 1~2원 오차가 날 수 있어요
                </p>
              </div>
            </div>
          </div>

          <footer className="mt-10 text-center text-xs text-slate-400">
            배열 · 반복문 · 조건분기로 만든 더치페이 계산기 · 학습용 예제
          </footer>
        </div>
      );
    }

    // ========================================
    // 🚀 Render
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<DutchPayApp />);
  </script>
</body>
</html>
