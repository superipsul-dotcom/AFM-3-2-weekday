<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- DOM을 이미지로 캡처 (한글 폰트 깨짐 방지의 핵심) -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <!-- PDF 생성 라이브러리 (UMD, 전역 jspdf 노출) -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }

    /* 미리보기/캡처 영역은 A4 비율을 흉내내어 본문 줄바꿈을 보존 */
    .pdf-page {
      box-sizing: border-box;
      background: #ffffff;
      color: #111827;
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.7;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ variant = 'primary', size = 'md', disabled = false, onClick, className = '', children, ...rest }) {
      const base = 'inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500 shadow-sm',
        secondary: 'bg-slate-100 text-slate-700 hover:bg-slate-200 focus:ring-slate-400',
        danger: 'bg-red-600 text-white hover:bg-red-700 focus:ring-red-500',
        ghost: 'bg-transparent text-slate-600 hover:bg-slate-100 focus:ring-slate-400',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2.5 text-sm',
        lg: 'px-5 py-3 text-base',
      };
      return (
        <button
          type="button"
          disabled={disabled}
          onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Input({ type = 'text', label, value, onChange, placeholder, error, disabled = false, id, className = '' }) {
      const inputId = id || (label ? `input-${label.replace(/\s/g, '-')}` : undefined);
      return (
        <div className={`w-full ${className}`}>
          {label && (
            <label htmlFor={inputId} className="block text-sm font-medium text-slate-700 mb-1.5">
              {label}
            </label>
          )}
          <input
            id={inputId}
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            disabled={disabled}
            className={`w-full px-3.5 py-2.5 rounded-xl border bg-white text-slate-800 placeholder-slate-400 transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 disabled:bg-slate-100 ${error ? 'border-red-400 focus:ring-red-500' : 'border-slate-300'}`}
          />
          {error && <p className="mt-1 text-xs text-red-500">{error}</p>}
        </div>
      );
    }

    function Textarea({ label, value, onChange, placeholder, rows = 12, id, className = '' }) {
      const inputId = id || (label ? `ta-${label.replace(/\s/g, '-')}` : undefined);
      return (
        <div className={`w-full ${className}`}>
          {label && (
            <label htmlFor={inputId} className="block text-sm font-medium text-slate-700 mb-1.5">
              {label}
            </label>
          )}
          <textarea
            id={inputId}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            rows={rows}
            className="w-full px-3.5 py-3 rounded-xl border border-slate-300 bg-white text-slate-800 placeholder-slate-400 leading-relaxed resize-y transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-slate-200 ${className}`}>
          {children}
        </div>
      );
    }

    function SegmentControl({ label, options, value, onChange }) {
      return (
        <div>
          {label && <label className="block text-sm font-medium text-slate-700 mb-1.5">{label}</label>}
          <div className="inline-flex w-full rounded-xl bg-slate-100 p-1">
            {options.map((opt) => (
              <button
                key={opt.value}
                type="button"
                onClick={() => onChange(opt.value)}
                aria-pressed={value === opt.value}
                className={`flex-1 px-3 py-1.5 text-sm font-medium rounded-lg transition-all ${
                  value === opt.value ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                }`}
              >
                {opt.label}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 상수 / 유틸
    // ========================================

    // A4 기준 px 너비 (96dpi). 미리보기와 캡처에 동일하게 사용해 비율을 맞춘다.
    const A4_WIDTH_PX = 794;   // 210mm
    const A4_HEIGHT_PX = 1123; // 297mm

    const ALIGN_OPTIONS = [
      { value: 'left', label: '왼쪽' },
      { value: 'center', label: '가운데' },
      { value: 'right', label: '오른쪽' },
    ];

    function sanitizeFileName(name) {
      const trimmed = (name || '').trim() || 'document';
      // 확장자 중복 제거 + 파일명 금지 문자 치환
      return trimmed.replace(/\.pdf$/i, '').replace(/[\\/:*?"<>|]/g, '_');
    }

    // ========================================
    // 📄 미리보기(캡처 대상) 컴포넌트
    // ========================================

    // transform: scale() 로 줄어든 자식의 실제 높이만큼만 공간을 차지하도록 래핑.
    // (transform은 레이아웃 박스 크기를 바꾸지 않아 빈 공간이 생기므로 직접 보정)
    function PreviewScaler({ scale = 0.5, children }) {
      const innerRef = useRef(null);
      const [innerHeight, setInnerHeight] = useState(0);

      useEffect(() => {
        if (!innerRef.current) return;
        const measure = () => {
          if (innerRef.current) setInnerHeight(innerRef.current.offsetHeight);
        };
        measure();
        const ro = new ResizeObserver(measure);
        ro.observe(innerRef.current);
        return () => ro.disconnect();
      });

      return (
        <div style={{ height: `${innerHeight * scale}px`, overflow: 'hidden' }}>
          <div
            ref={innerRef}
            style={{ transform: `scale(${scale})`, transformOrigin: 'top left', width: 'max-content' }}
          >
            {children}
          </div>
        </div>
      );
    }

    function DocumentPage({ innerRef, title, body, fontSize, align, lineHeight }) {
      return (
        <div
          ref={innerRef}
          className="pdf-page"
          style={{
            width: `${A4_WIDTH_PX}px`,
            minHeight: `${A4_HEIGHT_PX}px`,
            padding: '60px 56px',
            textAlign: align,
            fontSize: `${fontSize}px`,
            lineHeight: lineHeight,
          }}
        >
          {title && (
            <h1
              style={{
                fontSize: `${Math.round(fontSize * 1.9)}px`,
                fontWeight: 700,
                marginBottom: '28px',
                lineHeight: 1.3,
              }}
            >
              {title}
            </h1>
          )}
          <div>{body ? body : <span style={{ color: '#9ca3af' }}>본문을 입력하면 여기에 표시됩니다.</span>}</div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const [title, setTitle] = useState('나의 문서 제목');
      const [body, setBody] = useState('여기에 본문 내용을 입력하세요.\n\n한글도 깨지지 않고 그대로 PDF에 표시됩니다.\n줄바꿈과 빈 줄도 그대로 유지됩니다.');
      const [fileName, setFileName] = useState('document');
      const [fontSize, setFontSize] = useState(16);
      const [align, setAlign] = useState('left');
      const [lineHeight, setLineHeight] = useState(1.7);
      const [generating, setGenerating] = useState(false);
      const [toast, setToast] = useState(null);

      const captureRef = useRef(null);

      const showToast = useCallback((type, message) => {
        setToast({ type, message });
        setTimeout(() => setToast(null), 2600);
      }, []);

      const handleGenerate = useCallback(async () => {
        if (!title.trim() && !body.trim()) {
          showToast('error', '제목 또는 본문을 입력해주세요.');
          return;
        }
        if (!window.html2canvas || !window.jspdf) {
          showToast('error', '라이브러리를 불러오지 못했습니다. 새로고침 후 다시 시도하세요.');
          return;
        }

        setGenerating(true);
        try {
          const node = captureRef.current;

          // 고해상도 캡처 (scale 2 → 선명한 텍스트)
          const canvas = await window.html2canvas(node, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff',
            windowWidth: node.scrollWidth,
            windowHeight: node.scrollHeight,
          });

          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

          const pageWidthMm = pdf.internal.pageSize.getWidth();   // 210
          const pageHeightMm = pdf.internal.pageSize.getHeight(); // 297

          // 캡처 이미지를 페이지 너비에 맞추고, 높이가 넘치면 여러 페이지로 분할
          const imgWidthMm = pageWidthMm;
          const imgHeightMm = (canvas.height * imgWidthMm) / canvas.width;
          const imgData = canvas.toDataURL('image/jpeg', 0.95);

          let heightLeft = imgHeightMm;
          let position = 0;

          pdf.addImage(imgData, 'JPEG', 0, position, imgWidthMm, imgHeightMm);
          heightLeft -= pageHeightMm;

          while (heightLeft > 0) {
            position -= pageHeightMm;
            pdf.addPage();
            pdf.addImage(imgData, 'JPEG', 0, position, imgWidthMm, imgHeightMm);
            heightLeft -= pageHeightMm;
          }

          pdf.save(`${sanitizeFileName(fileName)}.pdf`);
          showToast('success', 'PDF가 생성되어 다운로드되었습니다.');
        } catch (err) {
          console.error(err);
          showToast('error', 'PDF 생성 중 오류가 발생했습니다.');
        } finally {
          setGenerating(false);
        }
      }, [title, body, fileName, showToast]);

      const charCount = useMemo(() => body.length, [body]);

      return (
        <div className="min-h-screen">
          {/* 헤더 */}
          <header className="bg-white border-b border-slate-200">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 py-5">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl bg-indigo-600 text-white flex items-center justify-center text-lg font-bold shadow-sm">
                  PDF
                </div>
                <div>
                  <h1 className="text-xl font-bold text-slate-800">PDF 생성기</h1>
                  <p className="text-sm text-slate-500">작성한 내용을 한글 깨짐 없이 PDF로 변환합니다.</p>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 sm:px-6 py-8">
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              {/* 입력 폼 */}
              <Card className="p-6 animate-fade-in">
                <h2 className="text-base font-semibold text-slate-800 mb-5">내용 작성</h2>

                <div className="space-y-5">
                  <Input
                    label="제목"
                    value={title}
                    onChange={(e) => setTitle(e.target.value)}
                    placeholder="문서 제목을 입력하세요"
                  />

                  <div>
                    <Textarea
                      label="본문 내용"
                      value={body}
                      onChange={(e) => setBody(e.target.value)}
                      placeholder="본문 내용을 입력하세요"
                      rows={12}
                    />
                    <p className="mt-1 text-xs text-slate-400 text-right">{charCount}자</p>
                  </div>

                  {/* 서식 옵션 */}
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2">
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1.5">
                        글자 크기 <span className="text-slate-400 font-normal">({fontSize}px)</span>
                      </label>
                      <input
                        type="range"
                        min="12"
                        max="28"
                        step="1"
                        value={fontSize}
                        onChange={(e) => setFontSize(Number(e.target.value))}
                        className="w-full accent-indigo-600"
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1.5">
                        줄 간격 <span className="text-slate-400 font-normal">({lineHeight.toFixed(1)})</span>
                      </label>
                      <input
                        type="range"
                        min="1.2"
                        max="2.4"
                        step="0.1"
                        value={lineHeight}
                        onChange={(e) => setLineHeight(Number(e.target.value))}
                        className="w-full accent-indigo-600"
                      />
                    </div>
                  </div>

                  <SegmentControl
                    label="정렬"
                    options={ALIGN_OPTIONS}
                    value={align}
                    onChange={setAlign}
                  />

                  <Input
                    label="파일명"
                    value={fileName}
                    onChange={(e) => setFileName(e.target.value)}
                    placeholder="document"
                  />
                  <p className="-mt-3 text-xs text-slate-400">저장 시 자동으로 .pdf 확장자가 붙습니다.</p>

                  <Button
                    onClick={handleGenerate}
                    disabled={generating}
                    size="lg"
                    className="w-full"
                  >
                    {generating ? (
                      <>
                        <svg className="animate-spin w-5 h-5" viewBox="0 0 24 24" fill="none">
                          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                        </svg>
                        생성 중...
                      </>
                    ) : (
                      <>
                        <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                          <polyline points="7 10 12 15 17 10" />
                          <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        PDF로 다운로드
                      </>
                    )}
                  </Button>
                </div>
              </Card>

              {/* 미리보기 */}
              <div className="animate-fade-in">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-base font-semibold text-slate-800">실시간 미리보기</h2>
                  <span className="text-xs text-slate-400">A4 비율</span>
                </div>
                <Card className="p-4 sm:p-6 bg-slate-100 overflow-auto max-h-[80vh]">
                  {/* 미리보기는 축소해서 보여주되, 캡처는 원본 크기에서 진행.
                      바깥 래퍼는 0.5배 축소된 너비/높이를 갖고, 안쪽 래퍼를 transform으로 줄인다. */}
                  <div
                    className="mx-auto"
                    style={{ width: `${A4_WIDTH_PX / 2}px`, maxWidth: '100%' }}
                  >
                    <PreviewScaler scale={0.5}>
                      <div className="shadow-lg">
                        <DocumentPage
                          innerRef={captureRef}
                          title={title}
                          body={body}
                          fontSize={fontSize}
                          align={align}
                          lineHeight={lineHeight}
                        />
                      </div>
                    </PreviewScaler>
                  </div>
                </Card>
              </div>
            </div>
          </main>

          {/* 토스트 */}
          {toast && (
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 animate-fade-in">
              <div
                className={`px-5 py-3 rounded-xl shadow-lg text-sm font-medium text-white ${
                  toast.type === 'success' ? 'bg-emerald-600' : 'bg-red-600'
                }`}
                role="status"
              >
                {toast.message}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
