<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMI 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 네오 브루탈리즘용 굵은 산세리프 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* 기본 폰트: 굵은 산세리프 */
    body { font-family: 'Space Grotesk', system-ui, sans-serif; }
    .font-display { font-family: 'Archivo Black', system-ui, sans-serif; }

    /* 결과 수치 등장 애니메이션 (Tailwind로 표현하기 까다로운 부분만 custom) */
    @keyframes popBrutal {
      0%   { transform: translate(6px, 6px); opacity: 0; }
      60%  { transform: translate(-2px, -2px); opacity: 1; }
      100% { transform: translate(0, 0); opacity: 1; }
    }
    .animate-pop { animation: popBrutal 0.22s ease-out; }

    /* 밝은 배경 + 그리드 패턴 */
    body {
      background-color: #FFE600;
      background-image:
        linear-gradient(rgba(0,0,0,0.08) 2px, transparent 2px),
        linear-gradient(90deg, rgba(0,0,0,0.08) 2px, transparent 2px);
      background-size: 32px 32px;
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useMemo } = React;

    // ========================================
    // 🎨 Design System Components (Neo-Brutalism)
    //  - 두꺼운 검정 테두리 + 하드 오프셋 섀도우 + 각진 박스
    // ========================================

    // 카드: border-4 + 하드 섀도우
    function Card({ children, className = "" }) {
      return (
        <div className={`border-4 border-black bg-white shadow-[8px_8px_0_0_#000] ${className}`}>
          {children}
        </div>
      );
    }

    // 인풋: 두꺼운 테두리 + 포커스 시 눌리는 transform
    function Input({ label, unit, value, onChange, placeholder, error, id }) {
      return (
        <div className="w-full">
          <label
            htmlFor={id}
            className="mb-2 block text-sm font-bold uppercase tracking-wide text-black"
          >
            {label}
          </label>
          <div className="relative">
            <input
              id={id}
              type="number"
              inputMode="decimal"
              min="0"
              value={value}
              onChange={(e) => onChange(e.target.value)}
              placeholder={placeholder}
              aria-invalid={!!error}
              className={`w-full border-4 border-black bg-white px-4 py-3 pr-16 text-xl font-bold text-black
                placeholder:font-medium placeholder:text-neutral-400
                shadow-[4px_4px_0_0_#000] outline-none transition-all
                focus:translate-x-[2px] focus:translate-y-[2px] focus:shadow-[2px_2px_0_0_#000]
                ${error
                  ? "bg-[#FFD6E0] focus:shadow-[2px_2px_0_0_#000]"
                  : "focus:bg-[#E6F9FF]"}`}
            />
            {unit && (
              <span className="pointer-events-none absolute inset-y-0 right-4 flex items-center text-base font-extrabold uppercase text-black">
                {unit}
              </span>
            )}
          </div>
          {error && (
            <p className="mt-2 inline-block border-2 border-black bg-[#FF3D81] px-2 py-1 text-sm font-bold text-white shadow-[3px_3px_0_0_#000]">
              {error}
            </p>
          )}
        </div>
      );
    }

    // 버튼: 두꺼운 테두리 + 하드 섀도우 + 호버/액티브 시 톡 눌림
    function Button({ children, onClick, variant = "primary", className = "", ...rest }) {
      const variants = {
        primary: "bg-[#00E5FF] text-black",
        ghost: "bg-[#C6FF00] text-black",
      };
      return (
        <button
          onClick={onClick}
          className={`inline-flex items-center justify-center border-4 border-black px-5 py-3
            text-base font-extrabold uppercase tracking-wide shadow-[5px_5px_0_0_#000]
            transition-all
            hover:-translate-x-[1px] hover:-translate-y-[1px] hover:shadow-[7px_7px_0_0_#000]
            active:translate-x-[3px] active:translate-y-[3px] active:shadow-[2px_2px_0_0_#000]
            ${variants[variant]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    // 배지: 채도 높은 색 블록 + 검정 테두리
    function Badge({ children, className = "" }) {
      return (
        <span className={`inline-flex items-center border-4 border-black px-5 py-2 text-base font-extrabold uppercase tracking-wide shadow-[4px_4px_0_0_#000] ${className}`}>
          {children}
        </span>
      );
    }

    // ========================================
    // 📊 BMI 분류 기준 (대한비만학회 / WHO 아시아-태평양)
    //  - 브루탈리즘 톤에 맞춘 채도 높은 색 블록
    // ========================================
    const CATEGORIES = [
      { key: "underweight", label: "저체중",         min: -Infinity, max: 18.5,     block: "bg-[#00E5FF]", badge: "bg-[#00E5FF] text-black", range: "18.5 미만" },
      { key: "normal",      label: "정상",           min: 18.5,      max: 23,       block: "bg-[#C6FF00]", badge: "bg-[#C6FF00] text-black", range: "18.5 ~ 22.9" },
      { key: "overweight",  label: "과체중",         min: 23,        max: 25,       block: "bg-[#FFE600]", badge: "bg-[#FFE600] text-black", range: "23 ~ 24.9" },
      { key: "obese1",      label: "비만 (1단계)",   min: 25,        max: 30,       block: "bg-[#FF8A00]", badge: "bg-[#FF8A00] text-black", range: "25 ~ 29.9" },
      { key: "obese2",      label: "고도비만 (2단계)", min: 30,      max: Infinity, block: "bg-[#FF3D81]", badge: "bg-[#FF3D81] text-white", range: "30 이상" },
    ];

    function classify(bmi) {
      return CATEGORIES.find((c) => bmi >= c.min && bmi < c.max) || CATEGORIES[CATEGORIES.length - 1];
    }

    // ========================================
    // 📄 BMI 계산기 페이지
    // ========================================
    function BmiCalculator() {
      const [height, setHeight] = useState("");
      const [weight, setWeight] = useState("");

      // 입력 검증 + BMI 계산 (실시간)
      const result = useMemo(() => {
        const trimmedH = height.trim();
        const trimmedW = weight.trim();

        // 둘 다 비어있으면 아직 안내 상태 (에러 아님)
        if (trimmedH === "" && trimmedW === "") {
          return { status: "empty" };
        }

        const h = Number(trimmedH);
        const w = Number(trimmedW);

        const errors = {};
        if (trimmedH === "") errors.height = "키를 입력해 주세요.";
        else if (!Number.isFinite(h) || h <= 0) errors.height = "올바른 키를 입력해 주세요.";
        else if (h < 50 || h > 300) errors.height = "키는 50~300cm 사이로 입력해 주세요.";

        if (trimmedW === "") errors.weight = "몸무게를 입력해 주세요.";
        else if (!Number.isFinite(w) || w <= 0) errors.weight = "올바른 몸무게를 입력해 주세요.";
        else if (w < 10 || w > 500) errors.weight = "몸무게는 10~500kg 사이로 입력해 주세요.";

        if (Object.keys(errors).length > 0) {
          return { status: "invalid", errors };
        }

        const meters = h / 100;
        const raw = w / (meters * meters);
        const bmi = Math.round(raw * 10) / 10; // 소수점 첫째자리
        return { status: "ok", bmi, category: classify(bmi) };
      }, [height, weight]);

      const errors = result.status === "invalid" ? result.errors : {};

      const handleReset = () => {
        setHeight("");
        setWeight("");
      };

      // 게이지 위치 계산 (15~35 BMI 범위를 0~100%로 매핑)
      const gaugePercent = result.status === "ok"
        ? Math.min(100, Math.max(0, ((result.bmi - 15) / (35 - 15)) * 100))
        : 0;

      return (
        <div className="mx-auto flex min-h-screen max-w-md flex-col px-4 py-8 sm:py-12">
          {/* 헤더 */}
          <header className="mb-8">
            <div className="inline-block border-4 border-black bg-[#FF3D81] px-3 py-1 text-sm font-extrabold uppercase tracking-widest text-white shadow-[4px_4px_0_0_#000]">
              건강 체크
            </div>
            <h1 className="font-display mt-4 text-5xl uppercase leading-none text-black sm:text-6xl">
              BMI<br />계산기
            </h1>
            <p className="mt-3 inline-block border-b-4 border-black pb-1 text-base font-bold text-black">
              키와 몸무게로 체질량지수를 확인하세요.
            </p>
          </header>

          {/* 입력 카드 */}
          <Card className="bg-[#E6F9FF] p-6">
            <div className="space-y-5">
              <Input
                id="height"
                label="키"
                unit="cm"
                value={height}
                onChange={setHeight}
                placeholder="예: 170"
                error={errors.height}
              />
              <Input
                id="weight"
                label="몸무게"
                unit="kg"
                value={weight}
                onChange={setWeight}
                placeholder="예: 65"
                error={errors.weight}
              />
              <Button variant="ghost" onClick={handleReset} className="w-full">
                초기화
              </Button>
            </div>
          </Card>

          {/* 결과 영역 */}
          <div className="mt-8">
            {result.status === "ok" ? (
              <Card className={`animate-pop p-6 text-center ${result.category.block}`}>
                <p className="text-sm font-extrabold uppercase tracking-widest text-black">
                  회원님의 BMI
                </p>
                <p className="font-display my-2 text-7xl leading-none text-black">
                  {result.bmi.toFixed(1)}
                </p>
                <Badge className="mt-2 bg-white text-black">
                  {result.category.label}
                </Badge>

                {/* 게이지 바 (각진 색 블록 + 검정 테두리) */}
                <div className="mt-7">
                  <div className="flex h-5 w-full border-4 border-black shadow-[4px_4px_0_0_#000]">
                    <div className="border-r-4 border-black bg-[#00E5FF]" style={{ flex: 1 }} />
                    <div className="border-r-4 border-black bg-[#C6FF00]" style={{ flex: 1 }} />
                    <div className="border-r-4 border-black bg-[#FFE600]" style={{ flex: 1 }} />
                    <div className="border-r-4 border-black bg-[#FF8A00]" style={{ flex: 1 }} />
                    <div className="bg-[#FF3D81]" style={{ flex: 1 }} />
                  </div>
                  <div className="relative h-5">
                    <div
                      className="absolute top-1 -translate-x-1/2 transition-all duration-300"
                      style={{ left: `${gaugePercent}%` }}
                    >
                      {/* 각진 마커 (검정 사각형) */}
                      <div className="h-4 w-4 rotate-45 border-4 border-black bg-white" />
                    </div>
                  </div>
                  <div className="mt-1 flex justify-between text-xs font-extrabold text-black">
                    <span>15</span>
                    <span>20</span>
                    <span>25</span>
                    <span>30</span>
                    <span>35</span>
                  </div>
                </div>
              </Card>
            ) : (
              <Card className={`p-6 text-center ${result.status === "invalid" ? "bg-[#FFD6E0]" : "bg-white"}`}>
                <div className="mx-auto mb-3 flex h-14 w-14 items-center justify-center border-4 border-black bg-white text-2xl shadow-[4px_4px_0_0_#000]">
                  {result.status === "invalid" ? "⚠️" : "📋"}
                </div>
                <p className="text-base font-bold text-black">
                  {result.status === "invalid"
                    ? "입력값을 다시 확인해 주세요."
                    : "키와 몸무게를 입력하면 BMI가 자동으로 계산됩니다."}
                </p>
              </Card>
            )}
          </div>

          {/* 분류 기준표 */}
          <Card className="mt-8 bg-white p-6">
            <h2 className="font-display mb-4 text-2xl uppercase text-black">분류 기준</h2>
            <ul className="space-y-3">
              {CATEGORIES.map((c) => {
                const active = result.status === "ok" && result.category.key === c.key;
                return (
                  <li
                    key={c.key}
                    className={`flex items-center justify-between border-4 border-black px-3 py-2 text-sm font-bold text-black transition-all
                      ${active
                        ? `${c.block} shadow-[5px_5px_0_0_#000] -translate-x-[1px] -translate-y-[1px]`
                        : "bg-white shadow-[3px_3px_0_0_#000]"}`}
                  >
                    <span className="flex items-center gap-2">
                      <span className={`h-4 w-4 border-2 border-black ${c.block}`} />
                      <span className="uppercase">{c.label}</span>
                    </span>
                    <span className="font-extrabold">{c.range}</span>
                  </li>
                );
              })}
            </ul>
          </Card>

          {/* 출처 / 면책 */}
          <footer className="mt-8 border-4 border-black bg-black px-4 py-3 text-center text-[11px] font-bold leading-relaxed text-white">
            기준: 대한비만학회 / WHO 아시아-태평양 기준 (BMI = 몸무게(kg) ÷ 키(m)²)
            <br />
            본 결과는 참고용이며 의학적 진단을 대체하지 않습니다.
          </footer>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return <BmiCalculator />;
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
