<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포켓몬 도감</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.92) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pop { 0% { transform: scale(1); } 40% { transform: scale(1.35); } 100% { transform: scale(1); } }
    .animate-fadeIn { animation: fadeIn 0.2s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.25s ease-out; }
    .animate-floaty { animation: floaty 3s ease-in-out infinite; }
    .animate-pop { animation: pop 0.3s ease-out; }
    .spinner { animation: spin 0.8s linear infinite; }
    .skeleton { background: linear-gradient(100deg, #e2e8f0 30%, #f1f5f9 50%, #e2e8f0 70%); background-size: 200% 100%; animation: shimmer 1.3s infinite; }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useMemo, useEffect, useRef, useCallback } = React;

    // ========================================
    // Data: PokéAPI 연동
    // ========================================
    const API_BASE = "https://pokeapi.co/api/v2";
    const PAGE = 30; // 한 번에 더 불러올 카드 수

    // 영문 타입명 → 한글 타입명
    const TYPE_KO = {
      normal: "노말", fire: "불꽃", water: "물", electric: "전기",
      grass: "풀", ice: "얼음", fighting: "격투", poison: "독",
      ground: "땅", flying: "비행", psychic: "에스퍼", bug: "벌레",
      rock: "바위", ghost: "고스트", dragon: "드래곤", dark: "악",
      steel: "강철", fairy: "페어리",
    };

    // 전체 포켓몬 목록(번호+영문이름)을 한 번 가져온다
    async function fetchIndex() {
      const res = await fetch(`${API_BASE}/pokemon?limit=100000&offset=0`);
      if (!res.ok) throw new Error("포켓몬 목록을 불러오지 못했습니다.");
      const data = await res.json();
      return data.results
        .map((r) => {
          const m = r.url.match(/\/pokemon\/(\d+)\//);
          return { id: m ? Number(m[1]) : null, name: r.name.toLowerCase() };
        })
        .filter((e) => e.id && e.id < 100000) // 비정상 폼(거대 id) 제외
        .sort((a, b) => a.id - b.id);
    }

    // 한 마리의 상세 정보를 가져온다 (기본 + 종 정보)
    async function fetchDetail(id) {
      const [pRes, sRes] = await Promise.all([
        fetch(`${API_BASE}/pokemon/${id}`),
        fetch(`${API_BASE}/pokemon-species/${id}`),
      ]);
      if (!pRes.ok) throw new Error(`#${id} 정보를 불러오지 못했습니다.`);
      const p = await pRes.json();
      const s = sRes.ok ? await sRes.json() : { names: [], flavor_text_entries: [] };

      const koName = (s.names.find((n) => n.language.name === "ko") || {}).name;
      const koFlavor =
        s.flavor_text_entries.find((f) => f.language.name === "ko") ||
        s.flavor_text_entries.find((f) => f.language.name === "en");
      const desc = koFlavor
        ? koFlavor.flavor_text.replace(/[\n\f\r­]/g, " ").replace(/\s+/g, " ").trim()
        : "설명이 없습니다.";
      const art = p.sprites.other["official-artwork"].front_default;
      const img = art || p.sprites.front_default;

      return {
        id: p.id,
        dex: p.id,
        nameKo: koName || p.name,
        nameEn: p.name.charAt(0).toUpperCase() + p.name.slice(1),
        types: p.types.map((t) => TYPE_KO[t.type.name] || t.type.name),
        height: p.height / 10 + " m",
        weight: p.weight / 10 + " kg",
        desc,
        img,
      };
    }

    // 상세 정보 캐시 (중복 요청 방지)
    const detailCache = new Map();
    const inflight = new Map();
    function getDetail(id) {
      if (detailCache.has(id)) return Promise.resolve(detailCache.get(id));
      if (inflight.has(id)) return inflight.get(id);
      const promise = fetchDetail(id)
        .then((d) => {
          detailCache.set(id, d);
          inflight.delete(id);
          return d;
        })
        .catch((e) => {
          inflight.delete(id);
          throw e;
        });
      inflight.set(id, promise);
      return promise;
    }

    // ========================================
    // 즐겨찾기 저장 (localStorage)
    // ========================================
    const FAV_KEY = "pokedex:favorites";
    function loadFavs() {
      try {
        return new Set(JSON.parse(localStorage.getItem(FAV_KEY) || "[]"));
      } catch {
        return new Set();
      }
    }
    function saveFavs(set) {
      try {
        localStorage.setItem(FAV_KEY, JSON.stringify([...set]));
      } catch {}
    }

    // ========================================
    // Type Theme (타입별 색상) — 18종 전체
    // ========================================
    const TYPE_THEME = {
      노말:   { chip: "bg-slate-400 text-white",   cardFrom: "from-slate-300",  cardTo: "to-slate-500",   ring: "ring-slate-300",  text: "text-slate-600",  soft: "bg-slate-50" },
      불꽃:   { chip: "bg-orange-500 text-white",  cardFrom: "from-orange-400", cardTo: "to-red-500",     ring: "ring-orange-300", text: "text-orange-600", soft: "bg-orange-50" },
      물:     { chip: "bg-blue-500 text-white",    cardFrom: "from-blue-400",   cardTo: "to-blue-600",    ring: "ring-blue-300",   text: "text-blue-600",   soft: "bg-blue-50" },
      전기:   { chip: "bg-yellow-400 text-yellow-900", cardFrom: "from-yellow-300", cardTo: "to-amber-500", ring: "ring-yellow-300", text: "text-amber-600", soft: "bg-yellow-50" },
      풀:     { chip: "bg-green-500 text-white",   cardFrom: "from-green-400",  cardTo: "to-emerald-600", ring: "ring-green-300",  text: "text-green-600",  soft: "bg-green-50" },
      얼음:   { chip: "bg-cyan-400 text-cyan-900", cardFrom: "from-cyan-300",   cardTo: "to-sky-500",     ring: "ring-cyan-300",   text: "text-cyan-600",   soft: "bg-cyan-50" },
      격투:   { chip: "bg-red-600 text-white",     cardFrom: "from-red-500",    cardTo: "to-rose-700",    ring: "ring-red-300",    text: "text-red-600",    soft: "bg-red-50" },
      독:     { chip: "bg-purple-500 text-white",  cardFrom: "from-purple-400", cardTo: "to-fuchsia-600", ring: "ring-purple-300", text: "text-purple-600", soft: "bg-purple-50" },
      땅:     { chip: "bg-amber-600 text-white",   cardFrom: "from-amber-500",  cardTo: "to-yellow-700",  ring: "ring-amber-300",  text: "text-amber-700",  soft: "bg-amber-50" },
      비행:   { chip: "bg-indigo-400 text-white",  cardFrom: "from-indigo-300", cardTo: "to-sky-500",     ring: "ring-indigo-300", text: "text-indigo-600", soft: "bg-indigo-50" },
      에스퍼: { chip: "bg-pink-500 text-white",    cardFrom: "from-pink-400",   cardTo: "to-rose-500",    ring: "ring-pink-300",   text: "text-pink-600",   soft: "bg-pink-50" },
      벌레:   { chip: "bg-lime-500 text-white",    cardFrom: "from-lime-400",   cardTo: "to-green-600",   ring: "ring-lime-300",   text: "text-lime-700",   soft: "bg-lime-50" },
      바위:   { chip: "bg-stone-500 text-white",   cardFrom: "from-stone-400",  cardTo: "to-stone-600",   ring: "ring-stone-300",  text: "text-stone-600",  soft: "bg-stone-50" },
      고스트: { chip: "bg-violet-600 text-white",  cardFrom: "from-violet-500", cardTo: "to-indigo-700",  ring: "ring-violet-300", text: "text-violet-600", soft: "bg-violet-50" },
      드래곤: { chip: "bg-indigo-600 text-white",  cardFrom: "from-indigo-500", cardTo: "to-violet-800",  ring: "ring-indigo-300", text: "text-indigo-700", soft: "bg-indigo-50" },
      악:     { chip: "bg-slate-700 text-white",   cardFrom: "from-slate-600",  cardTo: "to-slate-900",   ring: "ring-slate-400",  text: "text-slate-700",  soft: "bg-slate-100" },
      강철:   { chip: "bg-slate-500 text-white",   cardFrom: "from-slate-400",  cardTo: "to-slate-600",   ring: "ring-slate-300",  text: "text-slate-600",  soft: "bg-slate-50" },
      페어리: { chip: "bg-pink-400 text-white",    cardFrom: "from-pink-300",   cardTo: "to-rose-400",    ring: "ring-pink-300",   text: "text-pink-500",   soft: "bg-pink-50" },
    };
    const DEFAULT_THEME = TYPE_THEME["노말"];
    const themeFor = (types) => (types && TYPE_THEME[types[0]]) || DEFAULT_THEME;
    const padDex = (n) => "#" + String(n).padStart(4, "0");

    // SVG 폴백 이미지 (이미지 로드 실패 시)
    const fallbackImg = (label) =>
      "data:image/svg+xml;charset=UTF-8," +
      encodeURIComponent(
        `<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'>
          <rect width='100%' height='100%' fill='#e2e8f0'/>
          <circle cx='100' cy='90' r='42' fill='#cbd5e1'/>
          <text x='100' y='160' font-size='18' fill='#64748b' text-anchor='middle' font-family='sans-serif'>${label}</text>
        </svg>`
      );

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function TypeChip({ type, className = "" }) {
      const theme = TYPE_THEME[type] || DEFAULT_THEME;
      return (
        <span
          className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold tracking-wide shadow-sm ${theme.chip} ${className}`}
        >
          {type}
        </span>
      );
    }

    function PokeImage({ src, alt, className = "" }) {
      const [errored, setErrored] = useState(false);
      return (
        <img
          src={errored || !src ? fallbackImg(alt) : src}
          alt={alt}
          loading="lazy"
          onError={() => setErrored(true)}
          className={className}
        />
      );
    }

    // 별표(즐겨찾기) 버튼
    function StarButton({ active, onClick, size = "w-9 h-9", iconSize = "w-5 h-5" }) {
      return (
        <button
          onClick={(e) => {
            e.stopPropagation();
            onClick();
          }}
          aria-label={active ? "즐겨찾기 해제" : "즐겨찾기 추가"}
          aria-pressed={active}
          className={`${size} flex items-center justify-center rounded-full transition shadow-sm
            ${active ? "bg-yellow-400 text-white" : "bg-white/30 text-white hover:bg-white/50"}`}
        >
          <svg
            className={`${iconSize} ${active ? "animate-pop" : ""}`}
            fill={active ? "currentColor" : "none"}
            viewBox="0 0 24 24"
            stroke="currentColor"
            strokeWidth="2"
          >
            <path strokeLinecap="round" strokeLinejoin="round"
              d="M11.48 3.5a.56.56 0 011.04 0l2.05 4.46 4.9.52c.5.05.7.68.32 1.02l-3.66 3.3 1.02 4.82c.1.5-.43.88-.87.62L12 16.3l-4.3 2.46c-.44.26-.97-.12-.87-.62l1.02-4.82-3.66-3.3a.56.56 0 01.32-1.02l4.9-.52 2.05-4.46z" />
          </svg>
        </button>
      );
    }

    function SearchBar({ value, onChange, onClear }) {
      return (
        <div className="relative max-w-xl mx-auto">
          <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
              <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z" />
            </svg>
          </div>
          <input
            type="text"
            value={value}
            onChange={(e) => onChange(e.target.value)}
            placeholder="이름(한글/영문) 또는 도감 번호로 검색"
            aria-label="포켓몬 검색"
            className="w-full pl-12 pr-12 py-3.5 rounded-full bg-white shadow-lg border-2 border-transparent focus:border-red-400 focus:outline-none text-slate-700 placeholder-slate-400 transition"
          />
          {value && (
            <button
              onClick={onClear}
              aria-label="검색어 지우기"
              className="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600"
            >
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          )}
        </div>
      );
    }

    // ========================================
    // 🧩 Card Skeleton (상세 로딩 중)
    // ========================================
    function CardSkeleton({ id }) {
      return (
        <div className="rounded-2xl p-4 bg-white shadow-md overflow-hidden">
          <div className="flex items-center justify-between">
            <span className="text-slate-400 font-extrabold text-sm tracking-widest">{padDex(id)}</span>
            <div className="w-12 h-5 rounded-full skeleton"></div>
          </div>
          <div className="flex items-center justify-center my-3">
            <div className="w-24 h-24 rounded-full skeleton"></div>
          </div>
          <div className="h-4 w-2/3 mx-auto rounded skeleton mb-1.5"></div>
          <div className="h-3 w-1/3 mx-auto rounded skeleton"></div>
        </div>
      );
    }

    // ========================================
    // 🧩 Pokémon Card (lazy: 화면에 들어오면 상세 로드)
    // ========================================
    function PokemonCard({ entry, isFav, onToggleFav, onOpen, onLoaded }) {
      const [detail, setDetail] = useState(detailCache.get(entry.id) || null);

      useEffect(() => {
        if (detail) return;
        let alive = true;
        getDetail(entry.id)
          .then((d) => {
            if (alive) {
              setDetail(d);
              onLoaded && onLoaded();
            }
          })
          .catch(() => {});
        return () => {
          alive = false;
        };
      }, [entry.id]);

      if (!detail) return <CardSkeleton id={entry.id} />;

      const p = detail;
      const theme = themeFor(p.types);
      return (
        <div
          onClick={() => onOpen(p)}
          role="button"
          tabIndex={0}
          onKeyDown={(e) => (e.key === "Enter" || e.key === " ") && onOpen(p)}
          aria-label={`${p.nameKo} 상세 보기`}
          className={`group relative cursor-pointer rounded-2xl p-4 bg-gradient-to-br ${theme.cardFrom} ${theme.cardTo} shadow-md hover:shadow-2xl hover:-translate-y-1.5 transition-all duration-200 focus:outline-none focus:ring-4 ${theme.ring} overflow-hidden`}
        >
          {/* 배경 포켓볼 장식 */}
          <div className="absolute -right-6 -bottom-6 w-32 h-32 rounded-full border-[14px] border-white/15"></div>
          <div className="relative z-10">
            <div className="flex items-start justify-between">
              <StarButton active={isFav} onClick={() => onToggleFav(p.id)} size="w-8 h-8" iconSize="w-4 h-4" />
              <div className="flex flex-col items-end gap-1">
                <span className="text-white/90 font-extrabold text-xs tracking-widest">{padDex(p.dex)}</span>
                <div className="flex gap-1">
                  {p.types.map((t) => (
                    <TypeChip key={t} type={t} className="ring-1 ring-white/40" />
                  ))}
                </div>
              </div>
            </div>
            <div className="flex items-center justify-center my-2">
              <PokeImage
                src={p.img}
                alt={p.nameKo}
                className="w-28 h-28 md:w-32 md:h-32 object-contain drop-shadow-xl group-hover:scale-110 transition-transform duration-200"
              />
            </div>
            <div className="text-center">
              <h3 className="text-white font-extrabold text-lg leading-tight">{p.nameKo}</h3>
              <p className="text-white/80 text-xs font-medium">{p.nameEn}</p>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 Detail Modal
    // ========================================
    function DetailModal({ p, isFav, onToggleFav, onClose }) {
      useEffect(() => {
        const onKey = (e) => e.key === "Escape" && onClose();
        window.addEventListener("keydown", onKey);
        document.body.style.overflow = "hidden";
        return () => {
          window.removeEventListener("keydown", onKey);
          document.body.style.overflow = "";
        };
      }, [onClose]);

      if (!p) return null;
      const theme = themeFor(p.types);

      const Stat = ({ label, value }) => (
        <div className={`rounded-xl ${theme.soft} px-4 py-3 text-center`}>
          <div className="text-xs text-slate-500 font-semibold">{label}</div>
          <div className={`text-lg font-extrabold ${theme.text}`}>{value}</div>
        </div>
      );

      return (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 animate-fadeIn"
          onClick={onClose}
          role="dialog"
          aria-modal="true"
          aria-label={`${p.nameKo} 상세 정보`}
        >
          <div
            className="relative w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden animate-scaleIn"
            onClick={(e) => e.stopPropagation()}
          >
            {/* 헤더 */}
            <div className={`relative bg-gradient-to-br ${theme.cardFrom} ${theme.cardTo} pt-6 pb-20`}>
              <div className="absolute -right-8 -top-8 w-40 h-40 rounded-full border-[18px] border-white/15"></div>
              <div className="absolute top-4 right-4 z-10 flex gap-2">
                <StarButton active={isFav} onClick={() => onToggleFav(p.id)} />
                <button
                  onClick={onClose}
                  aria-label="닫기"
                  className="w-9 h-9 rounded-full bg-white/25 hover:bg-white/40 text-white flex items-center justify-center transition"
                >
                  <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>
              <div className="relative z-10 px-6">
                <span className="text-white/90 font-extrabold tracking-widest text-sm">{padDex(p.dex)}</span>
                <h2 className="text-white text-3xl font-black leading-tight">{p.nameKo}</h2>
                <p className="text-white/80 font-medium">{p.nameEn}</p>
                <div className="flex gap-1.5 mt-2">
                  {p.types.map((t) => (
                    <TypeChip key={t} type={t} className="ring-1 ring-white/40" />
                  ))}
                </div>
              </div>
            </div>

            {/* 이미지 (헤더 위로 겹침) */}
            <div className="flex justify-center -mt-16 relative z-10">
              <div className="bg-white rounded-full p-2 shadow-xl">
                <PokeImage src={p.img} alt={p.nameKo} className="w-32 h-32 object-contain animate-floaty" />
              </div>
            </div>

            {/* 본문 */}
            <div className="px-6 pb-6 pt-3">
              <div className="grid grid-cols-2 gap-3 mb-4">
                <Stat label="키" value={p.height} />
                <Stat label="몸무게" value={p.weight} />
              </div>
              <h4 className="text-sm font-bold text-slate-500 mb-1">설명</h4>
              <p className="text-slate-700 leading-relaxed text-sm">{p.desc}</p>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 Empty / Loading / Error
    // ========================================
    function EmptyState({ query, favOnly }) {
      return (
        <div className="col-span-full flex flex-col items-center justify-center py-20 text-center">
          <div className="w-24 h-24 rounded-full bg-slate-200 flex items-center justify-center mb-4">
            <svg className="w-12 h-12 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5">
              <path strokeLinecap="round" strokeLinejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
          <p className="text-lg font-bold text-slate-600">
            {favOnly ? "즐겨찾기한 포켓몬이 없어요" : "검색 결과가 없습니다"}
          </p>
          <p className="text-sm text-slate-400 mt-1">
            {favOnly
              ? "카드의 ⭐ 버튼을 눌러 즐겨찾기에 추가해 보세요."
              : query
              ? `"${query}" 에 해당하는 포켓몬을 찾을 수 없어요.`
              : ""}
          </p>
        </div>
      );
    }

    function LoadingState({ text = "포켓몬 도감을 불러오는 중..." }) {
      return (
        <div className="col-span-full flex flex-col items-center justify-center py-24 text-center">
          <div className="relative w-16 h-16 mb-5">
            <div className="absolute inset-0 rounded-full border-4 border-slate-200"></div>
            <div className="absolute inset-0 rounded-full border-4 border-red-500 border-t-transparent spinner"></div>
          </div>
          <p className="text-lg font-bold text-slate-600">{text}</p>
          <p className="text-sm text-slate-400 mt-1">PokéAPI에서 데이터를 가져오고 있어요.</p>
        </div>
      );
    }

    function ErrorState({ message, onRetry }) {
      return (
        <div className="col-span-full flex flex-col items-center justify-center py-24 text-center">
          <div className="w-20 h-20 rounded-full bg-red-100 flex items-center justify-center mb-4">
            <svg className="w-10 h-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.8">
              <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m0 3.75h.01M10.34 3.34l-7.5 13A1.5 1.5 0 004.14 19h15.72a1.5 1.5 0 001.3-2.25l-7.5-13a1.5 1.5 0 00-2.6 0z" />
            </svg>
          </div>
          <p className="text-lg font-bold text-slate-600">불러오기에 실패했어요</p>
          <p className="text-sm text-slate-400 mt-1 max-w-xs">{message}</p>
          <button
            onClick={onRetry}
            className="mt-5 px-5 py-2.5 rounded-full bg-red-500 hover:bg-red-600 text-white font-bold text-sm shadow-md transition"
          >
            다시 시도
          </button>
        </div>
      );
    }

    // ========================================
    // 🧩 Header
    // ========================================
    function Header({ total, favCount }) {
      return (
        <header className="bg-gradient-to-r from-red-600 to-red-500 text-white shadow-lg">
          <div className="max-w-5xl mx-auto px-4 py-5 flex items-center gap-3">
            <div className="relative w-10 h-10 rounded-full bg-white shadow-inner overflow-hidden shrink-0">
              <div className="absolute top-0 left-0 right-0 h-1/2 bg-red-500"></div>
              <div className="absolute top-1/2 left-0 right-0 h-[3px] -mt-[1.5px] bg-slate-800"></div>
              <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3.5 h-3.5 rounded-full bg-white border-[3px] border-slate-800"></div>
            </div>
            <div>
              <h1 className="text-2xl font-black tracking-tight leading-none">포켓몬 도감</h1>
              <p className="text-red-100 text-xs font-medium mt-0.5">
                Pokédex · 전체 {total ? total.toLocaleString() : "…"}마리 · ⭐ {favCount}
              </p>
            </div>
          </div>
        </header>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [index, setIndex] = useState([]); // 전체 목록 {id, name}
      const [status, setStatus] = useState("loading"); // loading | ready | error
      const [errorMsg, setErrorMsg] = useState("");

      const [query, setQuery] = useState("");
      const [favOnly, setFavOnly] = useState(false);
      const [selected, setSelected] = useState(null);
      const [favs, setFavs] = useState(() => loadFavs());
      const [visibleCount, setVisibleCount] = useState(PAGE);
      const [cacheVersion, setCacheVersion] = useState(0); // 상세 로드 시 한글 검색 갱신용

      const sentinelRef = useRef(null);

      // 전체 목록 로드
      const loadIndex = useCallback(async () => {
        setStatus("loading");
        setErrorMsg("");
        try {
          const list = await fetchIndex();
          setIndex(list);
          setStatus("ready");
        } catch (e) {
          setErrorMsg(e.message || "네트워크 오류가 발생했습니다.");
          setStatus("error");
        }
      }, []);

      useEffect(() => {
        loadIndex();
      }, [loadIndex]);

      // 즐겨찾기 토글
      const toggleFav = useCallback((id) => {
        setFavs((prev) => {
          const next = new Set(prev);
          next.has(id) ? next.delete(id) : next.add(id);
          saveFavs(next);
          return next;
        });
      }, []);

      // 필터링 (검색 + 즐겨찾기)
      const filtered = useMemo(() => {
        let base = index;
        if (favOnly) base = base.filter((e) => favs.has(e.id));

        const q = query.trim().toLowerCase();
        if (!q) return base;

        const qNum = q.replace(/^#/, "").replace(/^0+/, "");
        const isNum = /^\d+$/.test(qNum);

        return base.filter((e) => {
          if (isNum && String(e.id) === qNum) return true;
          if (e.name.includes(q)) return true; // 영문 이름 (전체 대상)
          // 한글 이름/타입은 이미 불러온(캐시된) 포켓몬에 한해 검색
          const d = detailCache.get(e.id);
          if (d) {
            if (d.nameKo.toLowerCase().includes(q)) return true;
            if (d.types.some((t) => t.includes(q))) return true;
          }
          return false;
        });
      }, [index, favs, favOnly, query, cacheVersion]);

      // 검색/필터 변경 시 페이지 리셋
      useEffect(() => {
        setVisibleCount(PAGE);
      }, [query, favOnly]);

      const visible = useMemo(() => filtered.slice(0, visibleCount), [filtered, visibleCount]);
      const hasMore = visibleCount < filtered.length;

      // 무한 스크롤
      useEffect(() => {
        if (status !== "ready" || !hasMore) return;
        const el = sentinelRef.current;
        if (!el) return;
        const ob = new IntersectionObserver(
          (entries) => {
            if (entries[0].isIntersecting) setVisibleCount((c) => c + PAGE);
          },
          { rootMargin: "500px" }
        );
        ob.observe(el);
        return () => ob.disconnect();
      }, [status, hasMore, filtered.length]);

      const onLoaded = useCallback(() => setCacheVersion((v) => v + 1), []);

      return (
        <div className="min-h-screen flex flex-col">
          <Header total={index.length} favCount={favs.size} />

          {/* 검색 영역 */}
          <div className="bg-gradient-to-b from-red-500 to-red-400 pb-10 pt-2">
            <div className="max-w-5xl mx-auto px-4">
              <SearchBar value={query} onChange={setQuery} onClear={() => setQuery("")} />
              <div className="flex items-center justify-center gap-3 mt-3">
                <button
                  onClick={() => setFavOnly((v) => !v)}
                  className={`inline-flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-bold shadow-sm transition
                    ${favOnly ? "bg-yellow-400 text-yellow-900" : "bg-white/90 text-slate-600 hover:bg-white"}`}
                >
                  <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M11.48 3.5a.56.56 0 011.04 0l2.05 4.46 4.9.52c.5.05.7.68.32 1.02l-3.66 3.3 1.02 4.82c.1.5-.43.88-.87.62L12 16.3l-4.3 2.46c-.44.26-.97-.12-.87-.62l1.02-4.82-3.66-3.3a.56.56 0 01.32-1.02l4.9-.52 2.05-4.46z" />
                  </svg>
                  {favOnly ? "즐겨찾기만 보는 중" : "즐겨찾기만 보기"}
                </button>
                {status === "ready" && (query.trim() || favOnly) && (
                  <span className="text-red-50 text-sm font-medium">{filtered.length}마리</span>
                )}
              </div>
            </div>
          </div>

          {/* 그리드 */}
          <main className="flex-1 max-w-5xl w-full mx-auto px-4 -mt-4 pb-12">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5">
              {status === "loading" ? (
                <LoadingState />
              ) : status === "error" ? (
                <ErrorState message={errorMsg} onRetry={loadIndex} />
              ) : filtered.length === 0 ? (
                <EmptyState query={query.trim()} favOnly={favOnly} />
              ) : (
                visible.map((e) => (
                  <PokemonCard
                    key={e.id}
                    entry={e}
                    isFav={favs.has(e.id)}
                    onToggleFav={toggleFav}
                    onOpen={setSelected}
                    onLoaded={onLoaded}
                  />
                ))
              )}
            </div>

            {/* 무한 스크롤 감지 + 더보기 */}
            {status === "ready" && hasMore && (
              <div ref={sentinelRef} className="flex justify-center py-8">
                <div className="relative w-10 h-10">
                  <div className="absolute inset-0 rounded-full border-4 border-slate-200"></div>
                  <div className="absolute inset-0 rounded-full border-4 border-red-400 border-t-transparent spinner"></div>
                </div>
              </div>
            )}
          </main>

          {/* 푸터 */}
          <footer className="bg-slate-800 text-slate-400 text-center text-xs py-4">
            포켓몬 도감 · 데이터 출처: PokéAPI
          </footer>

          {selected && (
            <DetailModal
              p={selected}
              isFav={favs.has(selected.id)}
              onToggleFav={toggleFav}
              onClose={() => setSelected(null)}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
